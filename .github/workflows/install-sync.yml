name: Install Board Sync

on:
  schedule:
    # 每半小时跑一次，限制在 Melbourne 时间 9 AM - 5 PM（AEDT, UTC+11）
    # UTC: 22:00 (前一天) - 06:00
    # 周一到周五（Melbourne 时间）= UTC 周日晚 - 周五早
    - cron: '0,30 22,23 * * 0-4'
    - cron: '0,30 0-6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests pdf2image Pillow
          sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Process GitHub Issues (date changes)
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python issue-processor.py

      - name: Sync Production Board to Install Board
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
        run: python install-sync.py

      - name: Export data to docs/data.json
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
        run: python data-export.py

      - name: Export Sign Proof PDFs to JPGs
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
        run: python proof-export.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/
          git diff --staged --quiet && echo "No changes" || (git commit -m "Update data and proofs" && git push)
