name: Sync and Export

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run install sync
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
        run: python install-sync.py

      - name: Export data
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
        run: python data-export.py

      - name: Commit data.json
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add docs/data.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "Update data.json" && git push)
