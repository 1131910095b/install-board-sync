<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACE SIGN · Install Schedule</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root {
    --bg: #0a0b0d;
    --panel: #14161a;
    --panel-2: #1c1f25;
    --panel-3: #252930;
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.14);
    --text: #ecedef;
    --text-dim: #9aa0a8;
    --text-faint: #6b7079;
    --accent: #7c5cff;

    --team-a: #4f8cff;
    --team-a-bg: rgba(79,140,255,0.12);
    --team-a-border: rgba(79,140,255,0.40);
    --team-b: #ff6d3b;
    --team-b-bg: rgba(255,109,59,0.12);
    --team-b-border: rgba(255,109,59,0.40);
    --team-none: #6b7079;

    --urgent: #ef4444;
    --high:   #f97316;
    --medium: #eab308;
    --low:    #10b981;

    --status-design: #a1e3f6;
    --status-prodfile: #faa1f1;
    --status-prod: #579bfc;
    --status-preinst: #ffadad;
    --status-inst: #ff6d3b;
    --status-completed: #c4c4c4;
    --status-finished: #00c875;
    --status-signproof: #037f4c;

    --shadow: 0 8px 24px rgba(0,0,0,0.45);
    --shadow-lg: 0 20px 50px rgba(0,0,0,0.6);
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* === LOGIN === */
  .login-overlay {
    position: fixed; inset: 0;
    background: radial-gradient(circle at 50% 30%, #1a1d24 0%, #0a0b0d 70%);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  .login-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 40px 36px;
    width: 380px;
    box-shadow: var(--shadow-lg);
    text-align: center;
  }
  .login-box h1 { font-size: 24px; margin-bottom: 4px; letter-spacing: 1px; }
  .login-box .sub { color: var(--text-dim); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 28px; }
  .login-box input {
    width: 100%; padding: 13px 14px;
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-size: 14px;
    margin-bottom: 12px;
  }
  .login-box input:focus { outline: none; border-color: var(--accent); }
  .login-box button {
    width: 100%; padding: 13px;
    background: var(--accent); color: white; border: none;
    border-radius: var(--radius-sm); cursor: pointer;
    font-size: 14px; font-weight: 500;
  }
  .login-error { color: #ef4444; font-size: 12px; margin-top: 8px; min-height: 16px; }

  /* === APP LAYOUT === */
  .app { display: none; min-height: 100vh; flex-direction: column; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  .topbar .brand { display: flex; align-items: baseline; gap: 12px; }
  .topbar .brand .logo {
    font-size: 18px; font-weight: 700; letter-spacing: 1px;
    color: var(--accent);
  }
  .topbar .brand .tag {
    font-size: 10px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase;
  }
  .topbar .actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn {
    padding: 8px 14px;
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer; font-size: 13px;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }
  .btn:hover { background: var(--panel-3); border-color: var(--border-strong); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn.primary:hover { background: #6849ff; }
  .btn.success { background: #10b981; border-color: #10b981; color: white; }
  .btn.success:hover { background: #0ea372; }
  .btn.small { padding: 5px 10px; font-size: 12px; }

  /* === STATS === */
  .stats-strip {
    display: grid; grid-template-columns: repeat(6, 1fr);
    gap: 1px; background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat-cell { background: var(--panel); padding: 14px 18px; }
  .stat-cell .label {
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-faint); margin-bottom: 4px;
  }
  .stat-cell .value { font-size: 22px; font-weight: 600; color: var(--text); }
  .stat-cell .value .small { font-size: 12px; color: var(--text-dim); font-weight: 400; margin-left: 6px; }
  .stat-cell.team-a { border-top: 3px solid var(--team-a); }
  .stat-cell.team-b { border-top: 3px solid var(--team-b); }
  .stat-cell.urgent { border-top: 3px solid var(--urgent); }
  .stat-cell.active { border-top: 3px solid var(--status-inst); }

  /* === TOOLBAR === */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    gap: 16px;
    flex-wrap: wrap;
  }
  .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .view-tabs {
    display: flex; background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .view-tab {
    padding: 7px 14px; cursor: pointer; font-size: 13px;
    color: var(--text-dim);
    border-right: 1px solid var(--border);
    user-select: none;
  }
  .view-tab:last-child { border-right: none; }
  .view-tab.active { background: var(--accent); color: white; }

  .scope-tabs {
    display: flex; background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .scope-tab {
    padding: 7px 12px; cursor: pointer; font-size: 12px;
    color: var(--text-dim);
    border-right: 1px solid var(--border);
    user-select: none;
  }
  .scope-tab:last-child { border-right: none; }
  .scope-tab.active { background: var(--status-inst); color: white; }

  .date-nav { display: flex; align-items: center; gap: 8px; }
  .date-nav .week-label { font-size: 14px; font-weight: 500; min-width: 240px; text-align: center; }
  .nav-btn { width: 28px; height: 28px; padding: 0; display: inline-flex; align-items: center; justify-content: center; }

  .team-toggles { display: flex; gap: 6px; }
  .team-toggle {
    padding: 6px 12px; cursor: pointer;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 12px; user-select: none;
    background: var(--panel-2); color: var(--text-dim);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .team-toggle .dot { width: 8px; height: 8px; border-radius: 50%; }
  .team-toggle.active.a { background: var(--team-a-bg); color: var(--team-a); border-color: var(--team-a-border); }
  .team-toggle.active.b { background: var(--team-b-bg); color: var(--team-b); border-color: var(--team-b-border); }
  .team-toggle.active.none { background: rgba(107,112,121,0.18); color: var(--text); border-color: rgba(107,112,121,0.4); }
  .team-toggle.a .dot { background: var(--team-a); }
  .team-toggle.b .dot { background: var(--team-b); }
  .team-toggle.none .dot { background: var(--team-none); }

  .type-toggles { display: flex; gap: 4px; }
  .type-toggle {
    padding: 5px 10px; cursor: pointer; font-size: 12px;
    background: var(--panel-2); color: var(--text-dim);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    user-select: none;
  }
  .type-toggle.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* === VIEW: CARDS (List by Day) === */
  .view-content { display: none; flex-direction: column; flex: 1; min-height: 0; }
  .view-content.active { display: flex; }
  .list-view { flex: 1; padding: 16px 24px 32px; overflow: auto; }

  .day-section { margin-bottom: 32px; }
  .day-section .day-header {
    display: flex; align-items: baseline; gap: 14px;
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .day-section .day-header .num { font-size: 32px; font-weight: 700; color: var(--text); line-height: 1; }
  .day-section .day-header .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; }
  .day-section .day-header .count { font-size: 12px; color: var(--text-faint); }
  .day-section .day-header .day-actions { margin-left: auto; display: flex; gap: 6px; }

  /* Drop target highlight */
  .day-section.drop-target {
    background: rgba(124,92,255,0.05);
    border-radius: var(--radius);
    padding: 8px;
    transition: background 0.15s;
  }
  .day-section.drop-target .day-header { background: linear-gradient(180deg, rgba(124,92,255,0.15), var(--bg)); }

  .cards-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
  }

  .job-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .job-card:hover {
    border-color: var(--border-strong);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }
  .job-card[draggable="true"] { cursor: grab; }
  .job-card[draggable="true"]:active { cursor: grabbing; }
  .job-card.dragging { opacity: 0.5; }
  .job-card.team-a { border-top: 3px solid var(--team-a); }
  .job-card.team-b { border-top: 3px solid var(--team-b); }
  .job-card.team-none { border-top: 3px solid var(--team-none); }

  .job-card .card-img-row {
    display: flex; gap: 2px; height: 110px; background: #000;
    overflow: hidden;
  }
  .job-card .card-img-row img {
    flex: 1; min-width: 0; object-fit: cover; height: 100%;
    background: #1a1a1a;
  }
  .job-card .card-body { padding: 12px 14px; }
  .job-card .card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
  .job-card .card-subtitle { font-size: 11px; color: var(--text-faint); margin-bottom: 8px; }
  .job-card .card-row {
    display: flex; gap: 8px; font-size: 11px; color: var(--text-dim);
    margin-bottom: 4px; align-items: center;
    flex-wrap: wrap;
  }
  .job-card .card-row .meta-key { color: var(--text-faint); margin-right: 2px; }

  .pill {
    display: inline-flex; align-items: center; padding: 2px 8px;
    border-radius: 99px; font-size: 10px; letter-spacing: 0.5px;
    font-weight: 500;
  }
  .pill.urgent { background: rgba(239,68,68,0.15); color: var(--urgent); }
  .pill.high   { background: rgba(249,115,22,0.15); color: var(--high); }
  .pill.medium { background: rgba(234,179,8,0.15); color: var(--medium); }
  .pill.low    { background: rgba(16,185,129,0.15); color: var(--low); }
  .pill.team-a { background: var(--team-a-bg); color: var(--team-a); }
  .pill.team-b { background: var(--team-b-bg); color: var(--team-b); }
  .pill.team-none { background: rgba(107,112,121,0.18); color: var(--text-dim); }
  .pill.type { background: rgba(124,92,255,0.18); color: #a78fff; }

  .pill.status { background: rgba(255,255,255,0.06); color: var(--text-dim); }
  .pill.status[data-status="Pre-Installation"] { background: rgba(255,173,173,0.18); color: var(--status-preinst); }
  .pill.status[data-status="Installation"] { background: rgba(255,109,59,0.18); color: var(--status-inst); }
  .pill.status[data-status="Production"] { background: rgba(87,155,252,0.18); color: var(--status-prod); }
  .pill.status[data-status="Design"] { background: rgba(161,227,246,0.18); color: var(--status-design); }
  .pill.status[data-status="Job Completed!"] { background: rgba(196,196,196,0.18); color: var(--status-completed); }
  .pill.status[data-status="Finished"] { background: rgba(0,200,117,0.18); color: var(--status-finished); }

  /* === MAP VIEW === */
  #map { flex: 1; min-height: 600px; }

  /* === MODAL === */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: none; align-items: center; justify-content: center;
    z-index: 1000; backdrop-filter: blur(4px);
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: min(900px, 92vw); max-height: 90vh;
    overflow-y: auto;
    padding: 28px;
    position: relative;
  }
  .modal .close-btn {
    position: absolute; top: 14px; right: 14px;
    background: var(--panel-2); border: 1px solid var(--border);
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 20px;
  }
  .modal h2 { font-size: 22px; margin-bottom: 4px; padding-right: 50px; }
  .modal .modal-sub { color: var(--text-faint); font-size: 12px; margin-bottom: 16px; }
  .modal .meta-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px;
    margin-bottom: 20px;
  }
  .modal .meta-item .meta-label {
    font-size: 11px; color: var(--text-faint); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 3px;
  }
  .modal .meta-item .meta-value { font-size: 14px; color: var(--text); }
  .modal .meta-item .meta-value input,
  .modal .meta-item .meta-value select {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: inherit;
  }
  .modal .meta-item .meta-value input:focus,
  .modal .meta-item .meta-value select:focus {
    outline: none; border-color: var(--accent);
  }
  .modal .section-title {
    font-size: 12px; color: var(--text-dim); letter-spacing: 1.5px;
    text-transform: uppercase; margin-bottom: 12px;
    margin-top: 24px; padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .modal .proofs-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
  }
  .modal .proofs-grid img {
    width: 100%; height: 180px; object-fit: contain;
    background: #000; border-radius: var(--radius-sm);
    cursor: pointer; border: 1px solid var(--border);
  }
  .modal-footer {
    margin-top: 24px; padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
  }
  .save-status {
    color: var(--status-finished); font-size: 12px; margin-right: auto;
    align-self: center;
  }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.95);
    display: none; align-items: center; justify-content: center;
    z-index: 2000; padding: 20px;
  }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .lightbox .close-btn {
    position: absolute; top: 20px; right: 20px;
    background: var(--panel-2); color: white;
    width: 40px; height: 40px; border-radius: 50%;
    cursor: pointer; border: none; font-size: 22px;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    box-shadow: var(--shadow);
    z-index: 3000;
    max-width: 380px;
    display: none;
  }
  .toast.show { display: block; animation: slideUp 0.3s ease-out; }
  .toast.success { border-left: 3px solid var(--status-finished); }
  .toast.error { border-left: 3px solid var(--urgent); }
  .toast.info { border-left: 3px solid var(--accent); }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* === FOOTER === */
  .footer {
    padding: 12px 24px;
    border-top: 1px solid var(--border);
    color: var(--text-faint);
    font-size: 11px;
    display: flex; justify-content: space-between;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .stats-strip { grid-template-columns: repeat(3, 1fr); }
    .toolbar { padding: 10px; }
    .list-view { padding: 12px; }
    .cards-grid { grid-template-columns: 1fr; }
  }

  /* Empty state */
  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--text-faint);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h1>ACE SIGN</h1>
    <div class="sub">Install Schedule</div>
    <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="current-password">
    <button id="loginBtn">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <div class="topbar">
    <div class="brand">
      <div class="logo">ACE SIGN</div>
      <div class="tag">Install Schedule v5</div>
    </div>
    <div class="actions">
      <button class="btn" id="refreshBtn" title="Reload data from server">↻ Refresh</button>
      <button class="btn success" id="downloadDayPdfBtn" title="Download today's PDF">↓ Today's PDF</button>
    </div>
  </div>

  <div class="stats-strip" id="statsStrip"></div>

  <div class="toolbar">
    <div class="toolbar-left">
      <div class="view-tabs" id="viewTabs">
        <div class="view-tab active" data-view="list">List</div>
        <div class="view-tab" data-view="map">Map</div>
      </div>
      <div class="scope-tabs" id="scopeTabs">
        <div class="scope-tab active" data-scope="all" title="All jobs with Install Date">All Installs</div>
        <div class="scope-tab" data-scope="active" title="Pre-Installation or Installation">Active</div>
      </div>
      <div class="date-nav">
        <button class="btn nav-btn" id="prevBtn">‹</button>
        <div class="week-label" id="weekLabel">—</div>
        <button class="btn nav-btn" id="nextBtn">›</button>
        <button class="btn small" id="todayBtn">Today</button>
      </div>
    </div>
    <div class="toolbar-right">
      <div class="type-toggles" id="typeToggles">
        <div class="type-toggle active" data-type="Install">Install</div>
        <div class="type-toggle active" data-type="Pick Up">Pick Up</div>
        <div class="type-toggle active" data-type="Delivery">Delivery</div>
      </div>
      <div class="team-toggles">
        <div class="team-toggle a active" data-team="Group A"><span class="dot"></span>A</div>
        <div class="team-toggle b active" data-team="Group B"><span class="dot"></span>B</div>
        <div class="team-toggle none active" data-team="__none__"><span class="dot"></span>None</div>
      </div>
    </div>
  </div>

  <!-- LIST VIEW -->
  <div class="view-content active" id="view-list">
    <div class="list-view" id="listView"></div>
  </div>

  <!-- MAP VIEW -->
  <div class="view-content" id="view-map">
    <div id="map"></div>
  </div>

  <div class="footer">
    <span id="footerText">—</span>
    <span id="footerHint">Drag cards between days to reschedule · Click for details</span>
  </div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modalContent">
    <button class="close-btn" id="modalClose">×</button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="close-btn" id="lightboxClose">×</button>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
// ============ CONFIG ============
const PASSWORD_HASH = 'a3b5e354c796d0bd0f8a966462c4a738858611963ff85f59d59bc9c9838eec51'; // ace2026

const GH_TOKEN = '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'; // <-- PASTE TOKEN HERE

// ============ AUTH ============
async function sha256(str) {
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

document.getElementById('loginBtn').addEventListener('click', tryLogin);
document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryLogin();
});

async function tryLogin() {
  const pw = document.getElementById('passwordInput').value;
  const hash = await sha256(pw);
  if (hash === PASSWORD_HASH) {
    sessionStorage.setItem('auth', '1');
    showApp();
  } else {
    document.getElementById('loginError').textContent = 'Incorrect password';
  }
}

function showApp() {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  init();
}

if (sessionStorage.getItem('auth') === '1') {
  showApp();
}

// ============ DATE UTILS ============
function startOfWeek(d) {
  const r = new Date(d);
  const day = r.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  r.setDate(r.getDate() + diff);
  r.setHours(0, 0, 0, 0);
  return r;
}
function endOfWeek(d) {
  const r = startOfWeek(d);
  r.setDate(r.getDate() + 4);
  return r;
}
function fmtDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function fmtDay(d) {
  return d.toLocaleDateString('en-US', { weekday: 'long' });
}
function ymd(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function isToday(d) {
  const t = new Date();
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
}

// ============ DATA ============
async function loadData() {
  try {
    const r = await fetch('data.json?t=' + Date.now());
    DATA = await r.json();
  } catch (e) {
    console.error(e);
    DATA = { items: [], updated_at: '', count: 0 };
  }
  // Merge local overrides
  for (const item of DATA.items) {
    if (LOCAL[item.id]) Object.assign(item, LOCAL[item.id]);
  }
  document.getElementById('footerText').textContent =
    `${DATA.count} jobs · Updated ${DATA.updated_at ? new Date(DATA.updated_at).toLocaleString() : '—'}`;
}

function saveLocal(itemId, patch) {
  LOCAL[itemId] = Object.assign(LOCAL[itemId] || {}, patch);
  localStorage.setItem('localOverrides', JSON.stringify(LOCAL));
  const item = DATA.items.find(i => i.id === itemId);
  if (item) Object.assign(item, patch);
}

// ============ STATS ============
function renderStats() {
  const items = DATA.items;
  const wkStart = startOfWeek(new Date());
  const wkEnd = new Date(wkStart); wkEnd.setDate(wkEnd.getDate() + 4); wkEnd.setHours(23,59,59,999);

  const inWeek = items.filter(i => {
    if (!i.install_date) return false;
    const d = new Date(i.install_date + 'T00:00');
    return d >= wkStart && d <= wkEnd;
  });

  const teamAJobs = inWeek.filter(i => i.team === 'Group A');
  const teamBJobs = inWeek.filter(i => i.team === 'Group B');
  const teamAHrs = teamAJobs.reduce((s, i) => s + parseFloat(i.duration_hours || 0), 0);
  const teamBHrs = teamBJobs.reduce((s, i) => s + parseFloat(i.duration_hours || 0), 0);

  const active = items.filter(i => ACTIVE_STATUSES.has(i.production_status));
  const urgent = items.filter(i => i.priority === 'Urgent');
  const unassigned = items.filter(i => !i.installer);

  const cells = [
    { label: 'Total Jobs', value: items.length, cls: '' },
    { label: 'Active (Pre-Inst/Inst)', value: active.length, cls: 'active' },
    { label: 'Group A · Week', value: `${teamAJobs.length}<span class="small">${teamAHrs.toFixed(0)}h</span>`, cls: 'team-a' },
    { label: 'Group B · Week', value: `${teamBJobs.length}<span class="small">${teamBHrs.toFixed(0)}h</span>`, cls: 'team-b' },
    { label: 'Urgent', value: urgent.length, cls: 'urgent' },
    { label: 'Unassigned', value: unassigned.length, cls: '' },
  ];

  document.getElementById('statsStrip').innerHTML = cells.map(c => `
    <div class="stat-cell ${c.cls}">
      <div class="label">${c.label}</div>
      <div class="value">${c.value}</div>
    </div>
  `).join('');
}

// ============ FILTERS ============
function applyFilters(items) {
  return items.filter(i => {
    // Scope filter
    if (currentScope === 'active' && !ACTIVE_STATUSES.has(i.production_status)) return false;
    // Type filter
    const type = i.project_type || 'Install';
    if (!typeFilters.has(type)) return false;
    // Team filter
    const teamKey = i.team || '__none__';
    if (!teamFilters.has(teamKey)) return false;
    return true;
  });
}

// ============ LIST VIEW ============
function renderList() {
  const container = document.getElementById('listView');
  const filtered = applyFilters(DATA.items).filter(i => i.install_date);

  // Group by date
  const byDate = {};
  for (const i of filtered) {
    if (!byDate[i.install_date]) byDate[i.install_date] = [];
    byDate[i.install_date].push(i);
  }

  const allDates = Object.keys(byDate).sort();
  document.getElementById('weekLabel').textContent =
    allDates.length ? `${allDates.length} day${allDates.length>1?'s':''}` : 'No jobs';

  if (allDates.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">📋</div>
        <div>No jobs match the current filters.</div>
      </div>`;
    return;
  }

  let html = '';
  for (const date of allDates) {
    const d = new Date(date + 'T00:00');
    const jobs = byDate[date];
    const totalHrs = jobs.reduce((s, j) => s + parseFloat(j.duration_hours || 0), 0);
    html += `
      <div class="day-section" data-date="${date}">
        <div class="day-header">
          <div class="num">${d.getDate()}</div>
          <div>
            <div class="label">${d.toLocaleDateString('en-US', { weekday: 'long' })}</div>
            <div style="font-size: 11px; color: var(--text-faint); margin-top: 2px;">${d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</div>
          </div>
          <div class="count">${jobs.length} job${jobs.length > 1 ? 's' : ''} · ${totalHrs}h</div>
          <div class="day-actions">
            <button class="btn small download-day-btn" data-date="${date}">↓ Day PDF</button>
          </div>
        </div>
        <div class="cards-grid">
          ${jobs.map(j => jobCardHTML(j)).join('')}
        </div>
      </div>`;
  }
  container.innerHTML = html;

  // Click handlers
  container.querySelectorAll('.job-card').forEach(el => {
    el.addEventListener('click', e => {
      // Don't open modal when starting drag
      if (e.target.closest('.no-modal')) return;
      openModal(el.dataset.id);
    });
    // Drag handlers
    el.addEventListener('dragstart', onDragStart);
    el.addEventListener('dragend', onDragEnd);
  });
  container.querySelectorAll('.day-section').forEach(el => {
    el.addEventListener('dragover', onDragOver);
    el.addEventListener('dragleave', onDragLeave);
    el.addEventListener('drop', onDrop);
  });
  container.querySelectorAll('.download-day-btn').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      downloadDayPDF(el.dataset.date);
    });
  });
}

function jobCardHTML(job) {
  const teamCls = job.team === 'Group A' ? 'team-a' : (job.team === 'Group B' ? 'team-b' : 'team-none');
  const teamPill = job.team
    ? `<span class="pill ${teamCls}">${escapeHTML(job.team)}</span>`
    : `<span class="pill team-none">Unassigned Team</span>`;
  const prio = job.priority ? `<span class="pill ${job.priority.toLowerCase()}">${job.priority}</span>` : '';
  const status = job.production_status
    ? `<span class="pill status" data-status="${escapeHTML(job.production_status)}">${escapeHTML(job.production_status)}</span>`
    : '';
  const type = job.project_type ? `<span class="pill type">${escapeHTML(job.project_type)}</span>` : '';

  const proofs = job.production_id
    ? [1,2,3].map(n => `<img src="proofs/${job.production_id}_p${n}_thumb.jpg" onerror="this.style.display='none'">`).join('')
    : '';

  return `
    <div class="job-card ${teamCls}" data-id="${job.id}" draggable="true">
      ${proofs ? `<div class="card-img-row">${proofs}</div>` : ''}
      <div class="card-body">
        <div class="card-title">${escapeHTML(job.name)}</div>
        ${job.invoice_number ? `<div class="card-subtitle">Invoice #${escapeHTML(job.invoice_number)}</div>` : ''}
        <div class="card-row">${prio} ${type} ${status}</div>
        <div class="card-row">${teamPill}
          ${job.installer ? `<span><span class="meta-key">Installer:</span>${escapeHTML(job.installer)}</span>` : ''}
        </div>
        ${job.address ? `<div class="card-row" style="color:var(--text-dim);">📍 ${escapeHTML(job.address)}</div>` : ''}
        <div class="card-row">
          ${job.producer ? `<span><span class="meta-key">PM:</span>${escapeHTML(job.producer)}</span>` : ''}
          ${job.sales ? `<span><span class="meta-key">Sales:</span>${escapeHTML(job.sales)}</span>` : ''}
          ${job.plan_hours ? `<span><span class="meta-key">Hrs:</span>${escapeHTML(job.plan_hours)}</span>` : ''}
        </div>
      </div>
    </div>`;
}

// ============ DRAG & DROP ============
let dragJobId = null;
function onDragStart(e) {
  dragJobId = e.currentTarget.dataset.id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragJobId);
}
function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  dragJobId = null;
  document.querySelectorAll('.day-section.drop-target').forEach(el => el.classList.remove('drop-target'));
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drop-target');
}
function onDragLeave(e) {
  if (e.currentTarget === e.target || !e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drop-target');
  }
}
async function onDrop(e) {
  e.preventDefault();
  const newDate = e.currentTarget.dataset.date;
  const jobId = dragJobId;
  e.currentTarget.classList.remove('drop-target');
  if (!jobId || !newDate) return;
  const job = DATA.items.find(i => i.id === jobId);
  if (!job) return;
  if (job.install_date === newDate) return;

  const oldDate = job.install_date;
  // Local update first
  saveLocal(jobId, { install_date: newDate });
  renderList();
  renderStats();
  toast(`Moved "${job.name}" to ${newDate}`, 'info');

  // Submit GitHub issue
  if (job.production_id) {
    try {
      await submitDateChangeIssue(job.production_id, newDate, job.name, oldDate);
      toast(`Pending sync to monday (will apply on next scheduled run)`, 'success');
    } catch (err) {
      console.error(err);
      toast(`Failed to queue sync: ${err.message}. Change saved locally.`, 'error');
    }
  } else {
    toast(`Local change only (no production link)`, 'info');
  }
}

async function submitDateChangeIssue(prodId, newDate, jobName, oldDate) {
  if (!GH_TOKEN) {
    throw new Error('GitHub token not configured. Set GH_TOKEN in index.html.');
  }
  const r = await fetch(`https://api.github.com/repos/${GH_REPO}/issues`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${GH_TOKEN}`,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
    },
    body: JSON.stringify({
      title: `[DATE-CHANGE] ${prodId} ${newDate}`,
      body: `**Job:** ${jobName}\n**Old date:** ${oldDate || '(none)'}\n**New date:** ${newDate}\n\nThis will be applied on next scheduled sync.`,
    }),
  });
  if (!r.ok) {
    const txt = await r.text();
    throw new Error(`GitHub API error ${r.status}: ${txt.slice(0, 100)}`);
  }
}

// ============ MAP VIEW ============
function renderMap() {
  document.getElementById('weekLabel').textContent = 'Map · Install only';

  if (!mapInstance) {
    mapInstance = L.map('map', { zoomControl: true }).setView([-37.8136, 144.9631], 10);
    // Carto Voyager - much prettier than default OSM
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(mapInstance);
  }

  mapMarkers.forEach(m => mapInstance.removeLayer(m));
  mapMarkers = [];

  // Only Install type
  const items = applyFilters(DATA.items)
    .filter(i => (i.project_type || 'Install') === 'Install')
    .filter(i => i.address);

  const bounds = [];

  items.forEach(async (job) => {
    const coords = await geocode(job.address);
    if (!coords) return;
    const color = job.priority === 'Urgent' ? '#ef4444'
                : job.priority === 'High'   ? '#f97316'
                : job.priority === 'Medium' ? '#eab308'
                : '#10b981';
    const borderColor = job.team === 'Group A' ? '#4f8cff' : (job.team === 'Group B' ? '#ff6d3b' : '#6b7079');
    const icon = L.divIcon({
      html: `<div style="width: 22px; height: 22px; background: ${color}; border: 3px solid ${borderColor}; border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.5);"></div>`,
      className: '',
      iconSize: [22, 22],
      iconAnchor: [11, 11],
    });
    const m = L.marker([coords.lat, coords.lon], { icon }).addTo(mapInstance);
    m.bindPopup(`
      <div style="font-family: sans-serif; min-width: 200px;">
        <strong>${escapeHTML(job.name)}</strong><br>
        <small>${escapeHTML(job.address)}</small><br>
        <span style="color:#666;">${job.install_date || '—'} · ${job.team || 'Unassigned'} · ${job.installer || ''}</span>
      </div>
    `);
    m.on('click', () => openModal(job.id));
    mapMarkers.push(m);
    bounds.push([coords.lat, coords.lon]);
    if (bounds.length === items.length && bounds.length > 0) {
      mapInstance.fitBounds(bounds, { padding: [50, 50] });
    }
  });
}

async function geocode(addr) {
  if (geoCache[addr]) return geoCache[addr];
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr)}&format=json&limit=1`);
    const j = await r.json();
    if (j.length) {
      const c = { lat: parseFloat(j[0].lat), lon: parseFloat(j[0].lon) };
      geoCache[addr] = c;
      localStorage.setItem('geoCache', JSON.stringify(geoCache));
      return c;
    }
  } catch (e) { console.error(e); }
  return null;
}

// ============ PDF EXPORT (Job Sheet Style) ============
async function loadImageAsDataUrl(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    const blob = await r.blob();
    return await new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload = () => res(reader.result);
      reader.onerror = rej;
      reader.readAsDataURL(blob);
    });
  } catch (e) {
    return null;
  }
}

async function downloadDayPDF(date) {
  const jobs = applyFilters(DATA.items).filter(i => i.install_date === date);
  if (!jobs.length) {
    toast(`No jobs on ${date}`, 'error');
    return;
  }
  toast(`Generating PDF for ${jobs.length} job${jobs.length>1?'s':''}...`, 'info');

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: 'portrait', unit: 'pt', format: 'a4' });
  const pageW = pdf.internal.pageSize.getWidth();
  const margin = 28;

  // Title page header
  pdf.setFontSize(20);
  pdf.setTextColor(124, 92, 255);
  pdf.text('ACE SIGN — Daily Job Sheet', margin, 36);
  pdf.setFontSize(11);
  pdf.setTextColor(60, 60, 60);
  const dObj = new Date(date + 'T00:00');
  pdf.text(`${dObj.toDateString()}  ·  ${jobs.length} job${jobs.length>1?'s':''}`, margin, 52);

  let y = 72;

  for (let i = 0; i < jobs.length; i++) {
    const job = jobs[i];
    const isFirst = i === 0;
    if (!isFirst) {
      pdf.addPage();
      y = 36;
    }
    await renderJobSheet(pdf, job, margin, y, pageW - margin * 2);
  }

  pdf.save(`ACE-${date}.pdf`);
  toast(`PDF saved`, 'success');
}

async function downloadJobPDF(jobId) {
  const job = DATA.items.find(i => i.id === jobId);
  if (!job) return;
  toast(`Generating PDF...`, 'info');

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: 'portrait', unit: 'pt', format: 'a4' });
  const pageW = pdf.internal.pageSize.getWidth();
  await renderJobSheet(pdf, job, 28, 36, pageW - 56);
  pdf.save(`ACE-job-${job.invoice_number || job.id}.pdf`);
  toast(`PDF saved`, 'success');
}

async function renderJobSheet(pdf, job, x, y, w) {
  // Style match: like your printout template
  // Team header
  const teamLabel = job.team
    ? `Team ${job.team.replace('Group ','')}:  ${job.installer || '(installers)'}`
    : `Team:  (not assigned)`;

  // Header bar
  pdf.setFillColor(255, 255, 255);
  pdf.setDrawColor(50, 50, 50);
  pdf.setLineWidth(0.7);
  pdf.rect(x, y, w, 22);
  pdf.setTextColor(220, 30, 30);
  pdf.setFontSize(13);
  pdf.setFont(undefined, 'bold');
  pdf.text(teamLabel, x + w/2, y + 15, { align: 'center' });
  pdf.setFont(undefined, 'normal');

  // Info table - 3 rows × multi cells
  let ry = y + 22;
  pdf.setTextColor(20, 20, 20);

  // Row 1: Job
  pdf.setFontSize(11);
  pdf.rect(x, ry, 90, 22);
  pdf.text('Job', x + 45, ry + 14, { align: 'center' });
  pdf.rect(x + 90, ry, w - 90, 22);
  pdf.setFont(undefined, 'bold');
  pdf.text(`${job.invoice_number ? '#'+job.invoice_number+'  ':''}${job.name || ''}`, x + 95, ry + 14);
  pdf.setFont(undefined, 'normal');
  ry += 22;

  // Row 2: Address
  pdf.rect(x, ry, 90, 22);
  pdf.text('Address', x + 45, ry + 14, { align: 'center' });
  pdf.rect(x + 90, ry, w - 90, 22);
  const addr = pdf.splitTextToSize(job.address || '', w - 100)[0] || '';
  pdf.text(addr, x + 95, ry + 14);
  ry += 22;

  // Row 3: project manager | sales | important
  const colW = (w - 90) / 3;
  pdf.rect(x, ry, 90, 22);
  pdf.text('Project Manager', x + 45, ry + 14, { align: 'center' });
  pdf.rect(x + 90, ry, colW, 22);
  pdf.text(job.producer || '', x + 95, ry + 14);
  pdf.rect(x + 90 + colW, ry, colW, 22);
  pdf.text('Sales', x + 90 + colW + 5, ry + 14);
  pdf.text(job.sales || '', x + 90 + colW + 50, ry + 14);
  pdf.rect(x + 90 + colW * 2, ry, colW, 22);
  pdf.text('Importance', x + 90 + colW * 2 + 5, ry + 14);
  // Color block for importance
  const importance = job.importance || 'Normal';
  if (importance === 'Critical') pdf.setFillColor(239, 68, 68);
  else if (importance === 'Important') pdf.setFillColor(249, 115, 22);
  else pdf.setFillColor(220, 220, 220);
  pdf.rect(x + 90 + colW * 2 + 75, ry + 4, colW - 80, 14, 'F');
  pdf.setTextColor(255, 255, 255);
  pdf.text(importance, x + 90 + colW * 2 + 78, ry + 14);
  pdf.setTextColor(20, 20, 20);
  ry += 22;

  // Row 4: Planned hours | Actual working hours | vehicle
  pdf.rect(x, ry, 90, 22);
  pdf.text('Planned hours', x + 45, ry + 14, { align: 'center' });
  pdf.rect(x + 90, ry, 60, 22);
  pdf.text(job.plan_hours || '', x + 120, ry + 14, { align: 'center' });
  pdf.rect(x + 150, ry, w - 240, 22);
  pdf.text('Actual working hours', x + 155, ry + 14);
  pdf.rect(x + w - 90, ry, 45, 22);
  pdf.text('vehicle', x + w - 67, ry + 14, { align: 'center' });
  pdf.rect(x + w - 45, ry, 45, 22);
  pdf.text(job.vehicle || '', x + w - 22, ry + 14, { align: 'center' });
  ry += 22;

  // Sign proof images
  if (job.production_id) {
    ry += 6;
    const proofImages = [];
    for (let p = 1; p <= 4; p++) {
      const data = await loadImageAsDataUrl(`proofs/${job.production_id}_p${p}.jpg`);
      if (data) proofImages.push(data);
    }
    if (proofImages.length) {
      const imgW = w / Math.min(proofImages.length, 4);
      const imgH = 110;
      proofImages.slice(0, 4).forEach((dataUrl, idx) => {
        try {
          pdf.addImage(dataUrl, 'JPEG', x + idx * imgW, ry, imgW - 4, imgH);
        } catch (e) { console.error(e); }
      });
      ry += imgH + 8;
    }
  }

  // Notes
  pdf.setFontSize(10);
  pdf.text('NOTE:', x, ry + 12);
  pdf.rect(x + 40, ry, w - 40, 50);
  if (job.scheduler_notes) {
    const lines = pdf.splitTextToSize(job.scheduler_notes, w - 50);
    pdf.text(lines, x + 45, ry + 12);
  }
}

// ============ VIEW SWITCHING ============
document.getElementById('viewTabs').addEventListener('click', e => {
  const tab = e.target.closest('.view-tab');
  if (!tab) return;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
  currentView = tab.dataset.view;
  document.getElementById('view-' + currentView).classList.add('active');
  render();
  if (currentView === 'map' && mapInstance) {
    setTimeout(() => mapInstance.invalidateSize(), 100);
  }
});

document.getElementById('scopeTabs').addEventListener('click', e => {
  const tab = e.target.closest('.scope-tab');
  if (!tab) return;
  document.querySelectorAll('.scope-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentScope = tab.dataset.scope;
  render();
  renderStats();
});

document.getElementById('todayBtn').addEventListener('click', () => {
  weekStart = startOfWeek(new Date());
  dayCursor = new Date();
  render();
  // Scroll to today's section if in list view
  if (currentView === 'list') {
    const today = ymd(new Date());
    const todaySec = document.querySelector(`.day-section[data-date="${today}"]`);
    if (todaySec) todaySec.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
});

document.getElementById('refreshBtn').addEventListener('click', async () => {
  await loadData();
  renderStats();
  render();
  toast('Data refreshed', 'success');
});

document.getElementById('downloadDayPdfBtn').addEventListener('click', () => {
  downloadDayPDF(ymd(new Date()));
});

document.querySelectorAll('.team-toggle').forEach(t => {
  t.addEventListener('click', () => {
    const team = t.dataset.team;
    if (teamFilters.has(team)) teamFilters.delete(team);
    else teamFilters.add(team);
    t.classList.toggle('active');
    render();
  });
});

document.querySelectorAll('.type-toggle').forEach(t => {
  t.addEventListener('click', () => {
    const type = t.dataset.type;
    if (typeFilters.has(type)) typeFilters.delete(type);
    else typeFilters.add(type);
    t.classList.toggle('active');
    render();
  });
});

// ============ TOAST ============
let toastTimer = null;
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.className = `toast ${type} show`;
  el.textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ============ RENDER ROUTER ============
function render() {
  if (currentView === 'list') renderList();
  else if (currentView === 'map') renderMap();
}

// ============ INIT ============
async function init() {
  await loadData();
  renderStats();
  render();
}

// ============ UTIL ============
function escapeHTML(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[c]));
}
