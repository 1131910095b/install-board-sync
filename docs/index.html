<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACE SIGN · Install Schedule</title>
<!-- Google Maps loaded dynamically -->
<style>
  :root {
    --bg: #0a0b0d;
    --panel: #14161a;
    --panel-2: #1c1f25;
    --panel-3: #252930;
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.14);
    --text: #ecedef;
    --text-dim: #9aa0a8;
    --text-faint: #6b7079;
    --accent: #7c5cff;

    --team-a: #4f8cff;
    --team-a-bg: rgba(79,140,255,0.12);
    --team-a-border: rgba(79,140,255,0.40);
    --team-b: #ff6d3b;
    --team-b-bg: rgba(255,109,59,0.12);
    --team-b-border: rgba(255,109,59,0.40);
    --team-none: #6b7079;

    --urgent: #ef4444;
    --high:   #f97316;
    --medium: #eab308;
    --low:    #10b981;

    --status-design: #a1e3f6;
    --status-prodfile: #faa1f1;
    --status-prod: #579bfc;
    --status-preinst: #ffadad;
    --status-inst: #ff6d3b;
    --status-completed: #c4c4c4;
    --status-finished: #00c875;
    --status-signproof: #037f4c;

    --shadow: 0 8px 24px rgba(0,0,0,0.45);
    --shadow-lg: 0 20px 50px rgba(0,0,0,0.6);
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  /* === LOGIN === */
  .login-overlay {
    position: fixed; inset: 0;
    background: radial-gradient(circle at 50% 30%, #1a1d24 0%, #0a0b0d 70%);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  .login-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 40px 36px;
    width: 380px;
    box-shadow: var(--shadow-lg);
    text-align: center;
  }
  .login-box h1 { font-size: 24px; margin-bottom: 4px; letter-spacing: 1px; }
  .login-box .sub { color: var(--text-dim); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 28px; }
  .login-box input {
    width: 100%; padding: 13px 14px;
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-size: 14px;
    margin-bottom: 12px;
  }
  .login-box input:focus { outline: none; border-color: var(--accent); }
  .login-box button {
    width: 100%; padding: 13px;
    background: var(--accent); color: white; border: none;
    border-radius: var(--radius-sm); cursor: pointer;
    font-size: 14px; font-weight: 500;
  }
  .login-error { color: #ef4444; font-size: 12px; margin-top: 8px; min-height: 16px; }

  /* === APP LAYOUT === */
  .app { display: none; min-height: 100vh; flex-direction: column; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  .topbar .brand { display: flex; align-items: baseline; gap: 12px; }
  .topbar .brand .logo {
    font-size: 18px; font-weight: 700; letter-spacing: 1px;
    color: var(--accent);
  }
  .topbar .brand .tag {
    font-size: 10px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase;
  }
  .topbar .actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn {
    padding: 8px 14px;
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer; font-size: 13px;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }
  .btn:hover { background: var(--panel-3); border-color: var(--border-strong); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn.primary:hover { background: #6849ff; }
  .btn.success { background: #10b981; border-color: #10b981; color: white; }
  .btn.success:hover { background: #0ea372; }
  .btn.small { padding: 5px 10px; font-size: 12px; }

  /* === STATS === */
  .stats-strip {
    display: grid; grid-template-columns: repeat(6, 1fr);
    gap: 1px; background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat-cell { background: var(--panel); padding: 16px 20px; }
  .stat-cell .label {
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-faint); margin-bottom: 6px; font-weight: 600;
  }
  .stat-cell .value { font-size: 28px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
  .stat-cell .value .small { font-size: 13px; color: var(--text-dim); font-weight: 400; margin-left: 6px; }
  .stat-cell.team-a { border-top: 3px solid var(--team-a); }
  .stat-cell.team-b { border-top: 3px solid var(--team-b); }
  .stat-cell.urgent { border-top: 3px solid var(--urgent); }
  .stat-cell.active { border-top: 3px solid var(--status-inst); }

  /* === TOOLBAR === */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    gap: 16px;
    flex-wrap: wrap;
  }
  .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .view-tabs {
    display: flex; background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .view-tab {
    padding: 7px 14px; cursor: pointer; font-size: 13px;
    color: var(--text-dim);
    border-right: 1px solid var(--border);
    user-select: none;
  }
  .view-tab:last-child { border-right: none; }
  .view-tab.active { background: var(--accent); color: white; }

  .scope-tabs {
    display: flex; background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .scope-tab {
    padding: 7px 12px; cursor: pointer; font-size: 12px;
    color: var(--text-dim);
    border-right: 1px solid var(--border);
    user-select: none;
  }
  .scope-tab:last-child { border-right: none; }
  .scope-tab.active { background: var(--status-inst); color: white; }

  .date-nav {
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, rgba(124,92,255,0.12), rgba(124,92,255,0.05));
    border: 1px solid rgba(124,92,255,0.25);
    border-radius: 10px;
    padding: 4px 6px;
  }
  .week-label-wrap {
    position: relative;
  }
  .date-nav .week-label {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    min-width: 240px;
    text-align: center;
    color: var(--accent);
    text-shadow: 0 0 18px rgba(124,92,255,0.4);
    padding: 4px 8px;
    line-height: 1.1;
    background: transparent;
    border: none;
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 6px;
    font-family: inherit;
  }
  .date-nav .week-label:hover {
    background: rgba(124,92,255,0.12);
  }
  .week-label::after {
    content: ' ▾';
    font-size: 14px;
    color: var(--accent);
    opacity: 0.6;
    margin-left: 4px;
  }
  .week-label-dropdown {
    position: absolute;
    top: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: 12px;
    box-shadow: var(--shadow-lg);
    min-width: 280px;
    padding: 12px;
    z-index: 100;
    display: none;
  }
  .week-label-dropdown.show {
    display: block;
    animation: dropFade 0.18s ease-out;
  }
  @keyframes dropFade {
    from { opacity: 0; transform: translateX(-50%) translateY(-4px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  .wld-section {
    margin-bottom: 14px;
  }
  .wld-section:last-child { margin-bottom: 0; }
  .wld-section-label {
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 1.5px;
    font-weight: 600;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .wld-option {
    display: block;
    width: 100%;
    text-align: left;
    padding: 8px 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 4px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .wld-option:last-child { margin-bottom: 0; }
  .wld-option:hover {
    background: var(--panel-3);
    border-color: var(--accent);
    color: var(--accent);
  }
  .wld-date-input {
    width: 100%;
    padding: 10px 14px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    color-scheme: dark;
    cursor: pointer;
    transition: all 0.15s;
    /* Hide ugly browser default styling */
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    position: relative;
  }
  .wld-date-input:hover {
    background: var(--panel-3);
    border-color: var(--accent);
  }
  .wld-date-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(124,92,255,0.2);
  }
  .wld-date-input::-webkit-calendar-picker-indicator {
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    opacity: 0.7;
    filter: invert(0.7) sepia(1) saturate(5) hue-rotate(220deg);
    transition: opacity 0.15s;
  }
  .wld-date-input::-webkit-calendar-picker-indicator:hover {
    opacity: 1;
  }
  /* Date placeholder color */
  .wld-date-input::-webkit-datetime-edit {
    color: var(--text);
  }
  .wld-date-input::-webkit-datetime-edit-fields-wrapper {
    padding: 0;
  }
  .wld-date-input:invalid::-webkit-datetime-edit {
    color: var(--text-faint);
  }
  /* Hide clear button some browsers add */
  .wld-date-input::-webkit-clear-button { display: none; }
  .wld-date-input::-webkit-inner-spin-button { display: none; }
  .nav-btn {
    width: 34px; height: 34px; padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--accent);
  }
  .nav-btn:hover {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .team-toggles { display: flex; gap: 6px; }
  .team-toggle {
    padding: 6px 12px; cursor: pointer;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 12px; user-select: none;
    background: var(--panel-2); color: var(--text-dim);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .team-toggle .dot { width: 8px; height: 8px; border-radius: 50%; }
  .team-toggle.active.a { background: var(--team-a-bg); color: var(--team-a); border-color: var(--team-a-border); }
  .team-toggle.active.b { background: var(--team-b-bg); color: var(--team-b); border-color: var(--team-b-border); }
  .team-toggle.active.none { background: rgba(107,112,121,0.18); color: var(--text); border-color: rgba(107,112,121,0.4); }
  .team-toggle.a .dot { background: var(--team-a); }
  .team-toggle.b .dot { background: var(--team-b); }
  .team-toggle.none .dot { background: var(--team-none); }

  .type-toggles { display: flex; gap: 4px; }
  .type-toggle {
    padding: 5px 10px; cursor: pointer; font-size: 12px;
    background: var(--panel-2); color: var(--text-dim);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    user-select: none;
  }
  .type-toggle.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* === VIEW: CARDS (List by Day) === */
  .view-content { display: none; flex-direction: column; flex: 1; min-height: 0; }
  .view-content.active { display: flex; }
  .list-view { flex: 1; padding: 16px 24px 32px; overflow: auto; }

  .day-section { margin-bottom: 36px; }
  .day-section .day-header {
    display: flex; align-items: baseline; gap: 16px;
    margin-bottom: 18px; padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .day-section .day-header .num { font-size: 42px; font-weight: 800; color: var(--text); line-height: 1; letter-spacing: -1px; }
  .day-section .day-header .label { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
  .day-section .day-header .count { font-size: 13px; color: var(--text-faint); }
  .day-section .day-header .day-actions { margin-left: auto; display: flex; gap: 6px; }

  /* Drop target highlight */
  .day-section.drop-target {
    background: rgba(124,92,255,0.05);
    border-radius: var(--radius);
    padding: 8px;
    transition: background 0.15s;
  }
  .day-section.drop-target .day-header { background: linear-gradient(180deg, rgba(124,92,255,0.15), var(--bg)); }

  .cards-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 18px;
  }

  .job-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .job-card:hover {
    border-color: var(--border-strong);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }
  .job-card[draggable="true"] { cursor: grab; }
  .job-card[draggable="true"]:active { cursor: grabbing; }
  .job-card { position: relative; }
  .seq-badge {
    position: absolute; top: 8px; left: 8px; z-index: 3;
    min-width: 22px; height: 22px; padding: 0 5px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(15,17,21,0.82); color: #fff;
    font-size: 12px; font-weight: 800; border-radius: 7px;
    border: 1px solid rgba(255,255,255,0.18);
    font-variant-numeric: tabular-nums;
  }
  .job-card.team-a .seq-badge { background: var(--team-a); }
  .job-card.team-b .seq-badge { background: var(--team-b); }
  .job-card.reorder-before { box-shadow: -4px 0 0 0 var(--accent); }
  .job-card.reorder-after  { box-shadow: 4px 0 0 0 var(--accent); }
  .pdf-ord-list { max-height: 240px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; padding: 6px; }
  .pdf-ord-row { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border-radius: 6px; }
  .pdf-ord-row:nth-child(odd) { background: rgba(255,255,255,0.03); }
  .pdf-ord-num { font-weight: 800; font-variant-numeric: tabular-nums; color: var(--text-faint); min-width: 20px; }
  .pdf-ord-tag { font-weight: 800; font-size: 11px; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 5px; color: #fff; }
  .pdf-ord-tag.t-a { background: var(--team-a); }
  .pdf-ord-tag.t-b { background: var(--team-b); }
  .pdf-ord-tag.t-none { background: var(--text-faint); }
  .pdf-ord-name { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .job-card.dragging { opacity: 0.5; }
  .job-card.team-a { border-left: 4px solid var(--team-a); }
  .job-card.team-b { border-left: 4px solid var(--team-b); }
  .job-card.team-none { border-left: 4px solid var(--team-none); }

  /* Top image strip */
  .job-card .card-img-row {
    display: flex; gap: 2px; height: 130px; background: #000;
    overflow: hidden;
  }
  .job-card .card-img-row img {
    flex: 1; min-width: 0; object-fit: cover; height: 100%;
    background: #1a1a1a;
  }

  .job-card .card-body { padding: 16px 18px; }

  /* === BIG TITLE === */
  .job-card .card-invoice {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .job-card .card-title {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 12px;
    color: var(--text);
    letter-spacing: -0.2px;
  }

  /* === Address - prominent === */
  .job-card .card-address {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 14px;
    line-height: 1.4;
    display: flex;
    align-items: flex-start;
    gap: 6px;
  }
  .job-card .card-address .pin {
    color: var(--text-faint);
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* === Badges row === */
  .job-card .card-badges {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 14px;
  }

  /* === Meta grid for People/Hours === */
  .job-card .card-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 16px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .job-card .card-meta .meta {
    display: flex; flex-direction: column;
  }
  .job-card .card-meta .meta-label {
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
    margin-bottom: 2px;
  }
  .job-card .card-meta .meta-value {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }
  .job-card .card-meta .meta-value.dim { color: var(--text-faint); font-weight: 400; }

  /* === Month navigator === */
  .month-nav {
    display: flex; align-items: center; gap: 4px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 2px;
  }
  .month-nav .month-label {
    font-size: 13px; font-weight: 600;
    padding: 6px 12px;
    min-width: 140px;
    text-align: center;
    color: var(--text);
  }
  .month-nav .month-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    width: 28px; height: 28px;
    border-radius: var(--radius-sm);
    font-size: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .month-nav .month-btn:hover { background: var(--panel-3); color: var(--text); }

  .pill {
    display: inline-flex; align-items: center; padding: 3px 10px;
    border-radius: 99px; font-size: 11px; letter-spacing: 0.3px;
    font-weight: 600;
  }
  .pill.urgent { background: rgba(239,68,68,0.15); color: var(--urgent); }
  .pill.high   { background: rgba(249,115,22,0.15); color: var(--high); }
  .pill.medium { background: rgba(234,179,8,0.15); color: var(--medium); }
  .pill.low    { background: rgba(16,185,129,0.15); color: var(--low); }
  .pill.team-a { background: var(--team-a-bg); color: var(--team-a); }
  .pill.team-b { background: var(--team-b-bg); color: var(--team-b); }
  .pill.team-none { background: rgba(107,112,121,0.18); color: var(--text-dim); }
  .pill.type { background: rgba(124,92,255,0.18); color: #a78fff; }

  .pill.status { background: rgba(255,255,255,0.06); color: var(--text-dim); }
  .pill.status[data-status="Pre-Installation"] { background: rgba(255,173,173,0.18); color: var(--status-preinst); }
  .pill.status[data-status="Installation"] { background: rgba(255,109,59,0.18); color: var(--status-inst); }
  .pill.status[data-status="Production"] { background: rgba(87,155,252,0.18); color: var(--status-prod); }
  .pill.status[data-status="Design"] { background: rgba(161,227,246,0.18); color: var(--status-design); }
  .pill.status[data-status="Job Completed!"] { background: rgba(196,196,196,0.18); color: var(--status-completed); }
  .pill.status[data-status="Finished"] { background: rgba(0,200,117,0.18); color: var(--status-finished); }

  /* === WEEK VIEW === */
  .week-view {
    flex: 1;
    padding: 16px 24px 32px;
    overflow: auto;
    display: flex;
    flex-direction: column;
  }
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(180px, 1fr));
    gap: 10px;
    min-width: 1400px;
    flex: 1;
  }
  .week-day-col {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 600px;
  }
  .week-day-col.today {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px rgba(124,92,255,0.3), 0 0 20px rgba(124,92,255,0.15);
  }
  .week-day-col.weekend {

  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ============ DATE UTILS ============
function startOfWeek(d) {
  const r = new Date(d);
  const day = r.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  r.setDate(r.getDate() + diff);
  r.setHours(0, 0, 0, 0);
  return r;
}
function endOfWeek(d) {
  const r = startOfWeek(d);
  r.setDate(r.getDate() + 4);
  return r;
}
function fmtDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function fmtDay(d) {
  return d.toLocaleDateString('en-US', { weekday: 'long' });
}
function ymd(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function isToday(d) {
  const t = new Date();
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
}

// ============ WEEK VIEW ============
function renderWeek() {
  const container = document.getElementById('weekView');
  const startOfThisWeek = startOfWeek(new Date());

  // Compute days array (7 days starting Monday)
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekViewCursor);
    d.setDate(d.getDate() + i);
    days.push(d);
  }

  // Determine which week relative to current
  const diffWeeks = Math.round((weekViewCursor - startOfThisWeek) / (7 * 24 * 60 * 60 * 1000));
  const weekLabel = diffWeeks === 0 ? 'This Week'
                  : diffWeeks === 1 ? 'Next Week'
                  : diffWeeks === 2 ? 'Week After Next'
                  : diffWeeks === -1 ? 'Last Week'
                  : diffWeeks > 0 ? `${diffWeeks} weeks ahead`
                  : `${Math.abs(diffWeeks)} weeks ago`;
  const startStr = days[0].toLocaleDateString('en-AU', { month: 'short', day: 'numeric' });
  const endStr = days[6].toLocaleDateString('en-AU', { month: 'short', day: 'numeric', year: 'numeric' });
  document.getElementById('weekLabel').textContent = `${startStr} – ${endStr}`;

  // Group filtered items by date
  const filtered = applyFilters(DATA.items).filter(i => i.install_date);
  const byDate = {};
  for (const i of filtered) {
    if (!byDate[i.install_date]) byDate[i.install_date] = [];
    byDate[i.install_date].push(i);
  }

  // Render
  let html = `
    <div class="week-nav-bar">
      <div class="week-nav-chips">
        <button class="week-nav-chip ${diffWeeks === 0 ? 'active' : ''}" data-week-offset="0">This Week</button>
        <button class="week-nav-chip ${diffWeeks === 1 ? 'active' : ''}" data-week-offset="1">Next Week</button>
        <button class="week-nav-chip ${diffWeeks === 2 ? 'active' : ''}" data-week-offset="2">Week After Next</button>
        <button class="week-nav-chip ${diffWeeks === 3 ? 'active' : ''}" data-week-offset="3">+3 Weeks</button>
      </div>
      <div style="flex:1; font-size: 13px; color: var(--text-dim); text-align:center; font-weight: 500;">
        <span style="color: var(--accent); font-weight: 700;">${weekLabel}</span>
      </div>
      <div class="week-nav-arrows">
        <button class="week-nav-arrow" id="weekPrevBtn">‹</button>
        <button class="week-nav-arrow" id="weekTodayBtn" style="width: auto; padding: 0 12px; font-size: 12px; font-weight: 600;">Today</button>
        <button class="week-nav-arrow" id="weekNextBtn">›</button>
      </div>
    </div>
    <div class="week-grid">
  `;

  for (const d of days) {
    const dKey = ymd(d);
    const dayJobs = byDate[dKey] || [];
    const isWeekend = d.getDay() === 0 || d.getDay() === 6;
    const isTodayCol = isToday(d);
    const cls = ['week-day-col'];
    if (isTodayCol) cls.push('today');
    if (isWeekend) cls.push('weekend');

    html += `
      <div class="${cls.join(' ')}" data-date="${dKey}">
        <div class="week-day-header">
          <div class="wdh-left">
            <div>
              <div class="wdh-name">${d.toLocaleDateString('en-US', { weekday: 'short' })}</div>
              <div class="wdh-num">${d.getDate()}</div>
            </div>
          </div>
          <div class="wdh-count">${dayJobs.length}</div>
        </div>
        <div class="week-day-body" data-date="${dKey}">
          ${dayJobs.length === 0
            ? '<div class="week-day-empty">No jobs</div>'
            : dayJobs.map(j => weekCardHTML(j)).join('')}
        </div>
      </div>
    `;
  }

  html += '</div>';
  container.innerHTML = html;

  // Click handlers
  container.querySelectorAll('.week-card').forEach(el => {
    el.addEventListener('click', () => openModal(el.dataset.id));
    el.addEventListener('dragstart', onDragStart);
    el.addEventListener('dragend', onDragEnd);
  });
  container.querySelectorAll('.week-day-body').forEach(el => {
    el.addEventListener('dragover', onDragOver);
    el.addEventListener('dragleave', onDragLeave);
    el.addEventListener('drop', onDrop);
  });

  // Nav buttons
  container.querySelectorAll('[data-week-offset]').forEach(b => {
    b.addEventListener('click', () => {
      const offset = parseInt(b.dataset.weekOffset);
      weekViewCursor = new Date(startOfThisWeek);
      weekViewCursor.setDate(weekViewCursor.getDate() + offset * 7);
      renderWeek();
    });
  });
  document.getElementById('weekPrevBtn').addEventListener('click', () => {
    weekViewCursor.setDate(weekViewCursor.getDate() - 7);
    renderWeek();
  });
  document.getElementById('weekNextBtn').addEventListener('click', () => {
    weekViewCursor.setDate(weekViewCursor.getDate() + 7);
    renderWeek();
  });
  document.getElementById('weekTodayBtn').addEventListener('click', () => {
    weekViewCursor = startOfWeek(new Date());
    renderWeek();
  });
}

function loadJSON(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key) || 'null') || fallback; }
  catch { return fallback; }
}
function saveJSON(key, obj) {
  try { localStorage.setItem(key, JSON.stringify(obj)); } catch {}
}
let JOB_ORDER = loadJSON('aceJobOrder', {});          // { "2026-06-03": ["id1","id2", ...] }

// Sort a day's jobs by the saved manual order (unsaved jobs keep their natural order, appended last)
function orderJobsForDay(date, jobs) {
  const ord = JOB_ORDER[date];
  if (!ord || !ord.length) return jobs;
  const pos = {};
  ord.forEach((id, i) => { pos[id] = i; });
  return [...jobs].sort((a, b) => {
    const pa = (a.id in pos) ? pos[a.id] : 9999;
    const pb = (b.id in pos) ? pos[b.id] : 9999;
    return pa - pb;
  });
}
function setDayOrder(date, ids) {
  JOB_ORDER[date] = ids;
  saveJSON('aceJobOrder', JOB_ORDER);
}
// Reorder within a day: move draggedId to the position of targetId (insert before it)
function reorderWithinDay(date, draggedId, targetId, insertAfter) {
  const section = document.querySelector(`.day-section[data-date="${date}"]`);
  if (!section) return;
  let ids = [...section.querySelectorAll('.job-card')].map(c => c.dataset.id);
  ids = ids.filter(id => id !== draggedId);
  let ti = ids.indexOf(targetId);
  if (ti < 0) ti = ids.length;
  if (insertAfter) ti += 1;
  ids.splice(ti, 0, draggedId);
  setDayOrder(date, ids);
  render();
  toast('Job order updated', 'info');
}

let dragJobId = null;
function onDragStart(e) {
  if (USER_ROLE !== 'editor') {
    e.preventDefault();
    return;
  }
  dragJobId = e.currentTarget.dataset.id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragJobId);
}
function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  dragJobId = null;
  document.querySelectorAll('.day-section.drop-target').forEach(el => el.classList.remove('drop-target'));
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drop-target');
}
function onDragLeave(e) {
  if (e.currentTarget === e.target || !e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drop-target');
  }
}
async function onDrop(e) {
  e.preventDefault();
  if (USER_ROLE !== 'editor') {
    e.currentTarget.classList.remove('drop-target');
    return;
  }
  const newDate = e.currentTarget.dataset.date;
  const jobId = dragJobId;
  e.currentTarget.classList.remove('drop-target');
  if (!jobId || !newDate) return;
  await rescheduleJob(jobId, newDate);
}

// ---- Card-level drag: reorder within a day, or reschedule across days ----
function onCardDragOver(e) {
  if (USER_ROLE !== 'editor' || !dragJobId) return;
  const card = e.currentTarget;
  if (card.dataset.id === dragJobId) return;
  e.preventDefault();
  e.stopPropagation();
  e.dataTransfer.dropEffect = 'move';
  const sameDay = card.dataset.date === (DATA.items.find(i => i.id === dragJobId) || {}).install_date;
  card.classList.remove('reorder-before', 'reorder-after');
  if (sameDay) {
    const r = card.getBoundingClientRect();
    const after = (e.clientX - r.left) > r.width / 2;
    card.classList.add(after ? 'reorder-after' : 'reorder-before');
  }
}
function onCardDragLeave(e) {
  e.currentTarget.classList.remove('reorder-before', 'reorder-after');
}
async function onCardDrop(e) {
  if (USER_ROLE !== 'editor' || !dragJobId) return;
  e.preventDefault();
  e.stopPropagation();
  const card = e.currentTarget;
  const targetId = card.dataset.id;
  const jobId = dragJobId;
  const after = card.classList.contains('reorder-after');
  card.classList.remove('reorder-before', 'reorder-after');
  if (!jobId || jobId === targetId) return;
  const dragged = DATA.items.find(i => i.id === jobId);
  const target = DATA.items.find(i => i.id === targetId);
  if (!dragged || !target) return;
  if (dragged.install_date === target.install_date) {
    // same day -> reorder
    reorderWithinDay(dragged.install_date, jobId, targetId, after);
  } else {
    // dropped on a card in another day -> reschedule to that day
    await rescheduleJob(jobId, target.install_date);
  }
}

async function rescheduleJob(jobId, newDate) {
  const job = DATA.items.find(i => i.id === jobId);
  if (!job || !newDate) return;
  if (job.install_date === newDate) return;

  const oldDate = job.install_date;
  // Local update first
  saveLocal(jobId, { install_date: newDate });
  render();
  toast(`Moved "${job.name}" to ${newDate}`, 'info');

  // Submit GitHub issue
  if (job.production_id) {
    try {
      await submitDateChangeIssue(job.production_id, newDate, job.name, oldDate);
      toast(`Pending sync to monday (will apply on next scheduled run)`, 'success');
    } catch (err) {
      console.error(err);
      toast(`Failed to queue sync: ${err.message}. Change saved locally.`, 'error');
    }
  } else {
    toast(`Local change only (no production link)`, 'info');
  }
}

async function submitDateChangeIssue(prodId, newDate, jobName, oldDate) {
  // Get password used to login (used as auth to Worker)
  const pw = sessionStorage.getItem('loginPw');
  if (!pw) {
    throw new Error('Session expired. Please sign out and log in again.');
  }
  const r = await fetch(WORKER_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Auth-Password': pw,
    },
    body: JSON.stringify({
      title: `[DATE-CHANGE] ${prodId} ${newDate}`,
      body: `**Job:** ${jobName}\n**Old date:** ${oldDate || '(none)'}\n**New date:** ${newDate}\n\nThis will be applied on next scheduled sync.`,
    }),
  });
  if (!r.ok) {
    const txt = await r.text();
    throw new Error(`Worker error ${r.status}: ${txt.slice(0, 150)}`);
  }
}

let _gmapsPromise = null;
function _loadClusterer() {
  return new Promise((resolve) => {
    if (window.markerClusterer) { resolve(); return; }
    const cs = document.createElement('script');
    cs.src = 'https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js';
    cs.onload = () => resolve();
    cs.onerror = () => resolve(); // still resolve without clusterer
    document.head.appendChild(cs);
  });
}
function loadGoogleMaps() {
  // Concurrency-safe: all callers share ONE promise so the Maps script is
  // injected at most once. Previously two concurrent callers (e.g. building
  // Group A & Group B route maps at the same time) could each inject the
  // script, loading Maps twice and breaking google.maps services.
  if (_gmapsPromise) return _gmapsPromise;
  _gmapsPromise = new Promise((resolve, reject) => {
    if (window.google?.maps) { gmapsLoaded = true; resolve(); return; }
    const cb = '__gmapsReady_' + Date.now();
    window[cb] = () => { gmapsLoaded = true; delete window[cb]; resolve(); };
    const script = document.createElement('script');
    script.src = `https://maps.googleapis.com/maps/api/js?key=${GMAPS_KEY}&libraries=geocoding,geometry&callback=${cb}&loading=async`;
    script.async = true;
    script.defer = true;
    script.onerror = () => { _gmapsPromise = null; reject(new Error('Failed to load Google Maps')); };
    document.head.appendChild(script);
  }).then(_loadClusterer);
  return _gmapsPromise;
}

async function renderMap() {
  const filterLabel = {

  // Init map once

  // Clear existing markers
  gmapMarkers.forEach(m => m.setMap(null));
  gmapMarkers = [];

  if (mapClusterer) {
    mapClusterer.clearMarkers();

  }

  // Apply date filter on top of global filters
  let items = applyFilters(DATA.items)

  items = filterByMapDate(items, mapDateFilter);

  // Geocode all + create markers

  const validMarkers = [];

  for (const job of items) {
    try {
      const coords = await geocode(job.address);
      if (!coords) continue;
      const marker = createJobMarker(job, coords);
      validMarkers.push(marker);
      gmapMarkers.push(marker);
      gmapMarkersByJobId[job.id] = marker;
      bounds.extend(marker.getPosition());
    } catch (e) {
      console.error('Marker error for', job.name, e);
    }
  }

  // Clusterer
  if (mapClusterEnabled && window.markerClusterer && validMarkers.length > 1) {
    mapClusterer = new markerClusterer.MarkerClusterer({
      map: gmap,
      markers: validMarkers,
      renderer: {
        render: ({ count, position }) => {
          return new google.maps.Marker({
            position,
            icon: {
              url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`
                <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 56 56">
                  <circle cx="28" cy="28" r="24" fill="#7c5cff" opacity="0.3"/>
                  <circle cx="28" cy="28" r="18" fill="#7c5cff"/>

                </svg>`),
              scaledSize: new google.maps.Size(56, 56),
              anchor: new google.maps.Point(28, 28),
            },
            zIndex: 1000 + count,
          });
        }
      }
    });
  }

  if (validMarkers.length > 0) {
    gmap.fitBounds(bounds, { top: 60, right: 60, bottom: 60, left: 60 });
    if (validMarkers.length === 1) {
      google.maps.event.addListenerOnce(gmap, 'idle', () => {
        if (gmap.getZoom() > 15) gmap.setZoom(15);

    }

  // Render sidebar list

  }

function filterByMapDate(items, filter) {
  if (filter === 'all') return items;
  if (filter === 'custom' && mapCustomDate) {
    return items.filter(i => i.install_date === mapCustomDate);
  }
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const todayKey = ymd(today);

  if (filter === 'today') {
    return items.filter(i => i.install_date === todayKey);
  }
  if (filter === 'tomorrow') {
    const t = new Date(today); t.setDate(t.getDate() + 1);
    return items.filter(i => i.install_date === ymd(t));
  }
  if (filter === 'week') {
    const start = startOfWeek(today);
    const end = new Date(start); end.setDate(end.getDate() + 6);
    return items.filter(i => {
      const d = new Date(i.install_date + 'T00:00');
      return d >= start && d <= end;
    });
  }
  if (filter === 'nextweek') {
    const start = startOfWeek(today);
    start.setDate(start.getDate() + 7);
    const end = new Date(start); end.setDate(end.getDate() + 6);
    return items.filter(i => {
      const d = new Date(i.install_date + 'T00:00');
      return d >= start && d <= end;
    });
  }
  if (filter === 'month') {
    const ym = mapCustomMonth || todayKey.slice(0, 7);
    return items.filter(i => i.install_date && i.install_date.startsWith(ym));
  }
  return items;
}

// === ROUTE PLANNING ===
async function planRoute(team) {
  // Get team's jobs from currently visible
  const teamJobs = mapVisibleJobs.filter(j => j.team === team);
  if (teamJobs.length === 0) {
    toast(`No ${team} jobs visible. Try changing the date filter (currently: ${mapDateFilter}).`, 'error');
    return;
  }
  if (teamJobs.length === 1) {
    toast(`${team} has only 1 job. Need at least 2 jobs to plan a route.`, 'error');
    // Just zoom to it
    const c = await geocode(teamJobs[0].address);
    if (c) {
      gmap.panTo({ lat: c.lat, lng: c.lon });
      gmap.setZoom(15);
    }
    return;
  }

  toast(`Planning route for ${team} (${teamJobs.length} stops)...`, 'info');

  // Resolve coords
  const stops = [];
  const failedAddresses = [];
  for (const j of teamJobs) {
    const c = await geocode(j.address);
    if (c) {
      stops.push({ job: j, coords: c });
    } else {
      failedAddresses.push(j.name + ' (' + (j.address || 'no address') + ')');
    }
  }

  if (stops.length < 2) {
    let msg = `Only ${stops.length} of ${teamJobs.length} ${team} addresses could be located. `;
    if (failedAddresses.length) {
      msg += `Failed: ${failedAddresses.slice(0, 2).join('; ')}`;
      if (failedAddresses.length > 2) msg += `, +${failedAddresses.length - 2} more`;
    }
    toast(msg, 'error');
    console.warn('Failed addresses:', failedAddresses);
    return;
  }

  if (failedAddresses.length) {
    toast(`Routing ${stops.length} of ${teamJobs.length} ${team} stops (${failedAddresses.length} address(es) failed to geocode)`, 'info');
    console.warn('Failed addresses:', failedAddresses);
  }

  // Origin = first stop, dest = last stop, rest = waypoints (let Google optimize)
  const origin = new google.maps.LatLng(stops[0].coords.lat, stops[0].coords.lon);
  const destination = new google.maps.LatLng(stops[stops.length - 1].coords.lat, stops[stops.length - 1].coords.lon);
  const waypoints = stops.slice(1, -1).map(s => ({
    location: new google.maps.LatLng(s.coords.lat, s.coords.lon),
    stopover: true,
  }));

  directionsService.route({
    origin,
    destination,
    waypoints,
    optimizeWaypoints: true,
    travelMode: google.maps.TravelMode.DRIVING,
  }, (result, status) => {
    if (status !== 'OK') {
      let msg = 'Route planning failed: ' + status;
      if (status === 'REQUEST_DENIED') {
        msg += ' — Directions API may not be enabled. Go to Google Cloud Console → APIs & Services → Library → enable "Directions API"';
      } else if (status === 'OVER_QUERY_LIMIT') {
        msg += ' — Hit query limit. Try again later.';
      } else if (status === 'ZERO_RESULTS') {
        msg += ' — Google could not find a driving route between these stops.';
      }
      toast(msg, 'error');
      return;
    }
    directionsRenderer.setDirections(result);

    // Reorder list by Google's optimized order
    const order = result.routes[0].waypoint_order;
    const orderedStops = [stops[0], ...order.map(i => stops[i + 1]), stops[stops.length - 1]];
    const orderedIds = orderedStops.map(s => s.job.id);

    renderMapList(mapVisibleJobs, orderedIds);
    addRouteOrderLabels(orderedStops, team);

    const legs = result.routes[0].legs;
    const totalDist = legs.reduce((s, l) => s + l.distance.value, 0);
    const totalDur = legs.reduce((s, l) => s + l.duration.value, 0);

    const teamColor = team === 'Group A' ? 'var(--team-a)' : 'var(--team-b)';
    document.getElementById('routeSummary').style.display = '';
    document.getElementById('routeSummary').innerHTML = `
      <div class="row"><span class="label">Team</span><span class="value" style="color: ${teamColor};">${team}</span></div>
      <div class="row"><span class="label">Stops</span><span class="value">${stops.length}</span></div>
      <div class="row"><span class="label">Distance</span><span class="value">${(totalDist/1000).toFixed(1)} km</span></div>
      <div class="row"><span class="label">Drive Time</span><span class="value">${Math.round(totalDur/60)} min</span></div>
    `;
    document.getElementById('clearRouteBtn').style.display = '';
    toast(`Route planned for ${team}: ${stops.length} stops`, 'success');
  });
}

function addRouteOrderLabels(orderedStops, team) {

async function geocode(addr) {
  if (geoCache[addr]) return geoCache[addr];
  try {
    if (!window.google?.maps?.Geocoder) {
      await loadGoogleMaps();
    }
    const geocoder = new google.maps.Geocoder();
    const result = await new Promise((resolve, reject) => {
      geocoder.geocode({ address: addr, region: 'au' }, (results, status) => {
        if (status === 'OK' && results?.[0]) resolve(results[0]);
        else reject(new Error(status));
      });
    });
    const loc = result.geometry.location;
    const c = { lat: loc.lat(), lon: loc.lng() };
    geoCache[addr] = c;
    localStorage.setItem('geoCache', JSON.stringify(geoCache));
    return c;
  } catch (e) {
    console.warn('Geocode failed for', addr, e);
    return null;
  }
}

// ============ LIGHTBOX (with prev/next) ============
let lightboxImages = []; // array of src URLs
let lightboxIndex = 0;

function openLightbox(src, allSrcs) {
  // allSrcs is optional array of all images in this gallery
  if (allSrcs && allSrcs.length) {
    lightboxImages = allSrcs.filter(s => s); // remove empties
    lightboxIndex = Math.max(0, lightboxImages.indexOf(src));
  } else {
    lightboxImages = [src];
    lightboxIndex = 0;
  }
  showLightboxImage();
  document.getElementById('lightbox').classList.add('show');
}

function showLightboxImage() {
  const img = document.getElementById('lightboxImg');
  const ind = document.getElementById('lightboxIndicator');
  const prev = document.getElementById('lightboxPrev');
  const next = document.getElementById('lightboxNext');
  img.src = lightboxImages[lightboxIndex];
  ind.textContent = `${lightboxIndex + 1} / ${lightboxImages.length}`;
  if (lightboxImages.length <= 1) {
    prev.classList.add('hidden');
    next.classList.add('hidden');
    ind.style.display = 'none';
  } else {
    prev.classList.remove('hidden');
    next.classList.remove('hidden');
    ind.style.display = '';
  }
}

function lightboxPrev() {
  if (lightboxImages.length <= 1) return;
  lightboxIndex = (lightboxIndex - 1 + lightboxImages.length) % lightboxImages.length;
  showLightboxImage();
}
function lightboxNext() {
  if (lightboxImages.length <= 1) return;
  lightboxIndex = (lightboxIndex + 1) % lightboxImages.length;
  showLightboxImage();
}

document.getElementById('lightboxClose').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('show');
});
document.getElementById('lightboxPrev').addEventListener('click', (e) => {
  e.stopPropagation();
  lightboxPrev();
});
document.getElementById('lightboxNext').addEventListener('click', (e) => {
  e.stopPropagation();
  lightboxNext();
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target.id === 'lightbox' || e.target.classList.contains('lightbox-img-wrap')) {
    document.getElementById('lightbox').classList.remove('show');
  }
});
// Keyboard nav
document.addEventListener('keydown', (e) => {
  if (!document.getElementById('lightbox').classList.contains('show')) return;
  if (e.key === 'ArrowLeft') lightboxPrev();
  else if (e.key === 'ArrowRight') lightboxNext();
  else if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('show');
});

async function loadImageAsDataUrl(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    const blob = await r.blob();
    return await new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload = () => res(reader.result);
      reader.onerror = rej;
      reader.readAsDataURL(blob);
    });
  } catch (e) {
    return null;
  }
}

function getImageDims(dataUrl) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve({ w: img.naturalWidth || img.width, h: img.naturalHeight || img.height });
    img.onerror = () => resolve({ w: 800, h: 600 }); // fallback
    img.src = dataUrl;
  });
}

// ===== Chinese font for PDF (loaded on demand) =====
let _cnFontLoading = null;
function ensureCNFont() {
  if (window.ACE_CN_FONT_B64) return Promise.resolve(true);
  if (_cnFontLoading) return _cnFontLoading;
  _cnFontLoading = new Promise((resolve) => {
    const s = document.createElement('script');
    s.src = 'ace-cn-font.js';   // same folder on GitHub Pages
    s.onload = () => resolve(!!window.ACE_CN_FONT_B64);
    s.onerror = () => { console.warn('CN font failed to load'); resolve(false); };
    document.head.appendChild(s);
  });
  return _cnFontLoading;
}

const _hasCJK = (s) => /[\u2e80-\u9fff\u3000-\u303f\uff00-\uffef]/.test(s);

// Register the CN font on a pdf instance and auto-route any CJK text to it.
// Non-CJK text keeps Helvetica (crisp). Returns true if installed.
function installCNFont(pdf) {
  if (!window.ACE_CN_FONT_B64) return false;
  try {
    pdf.addFileToVFS(window.ACE_CN_FONT_FILE, window.ACE_CN_FONT_B64);
    pdf.addFont(window.ACE_CN_FONT_FILE, window.ACE_CN_FONT_NAME, 'normal');
  } catch (e) { console.warn('addFont failed', e); return false; }
  const CN = window.ACE_CN_FONT_NAME;
  const _text = pdf.text.bind(pdf);
  pdf.text = function(txt, x, y, options) {
    const s = Array.isArray(txt) ? txt.join('') : String(txt == null ? '' : txt);
    if (_hasCJK(s)) {
      const cur = pdf.getFont();
      try { pdf.setFont(CN, 'normal'); } catch (e) {}
      const r = _text(txt, x, y, options);
      try { pdf.setFont(cur.fontName, cur.fontStyle); } catch (e) { try { pdf.setFont('helvetica', 'normal'); } catch (_) {} }
      return r;
    }
    return _text(txt, x, y, options);
  };
  const _split = pdf.splitTextToSize.bind(pdf);
  pdf.splitTextToSize = function(text, maxlen, options) {
    const s = String(text == null ? '' : text);
    if (_hasCJK(s)) {
      const cur = pdf.getFont();
      try { pdf.setFont(CN, 'normal'); } catch (e) {}
      const r = _split(text, maxlen, options);
      try { pdf.setFont(cur.fontName, cur.fontStyle); } catch (e) {}
      return r;
    }
    return _split(text, maxlen, options);
  };
  return true;
}

// ===== Static route map for PDF cover (company -> stops in list order) =====
const COMPANY_ADDRESS = 'Unit 4/222 Fairbairn Rd, Sunshine West VIC 3020';
const STATIC_MAP_W = 640, STATIC_MAP_H = 360;  // requested px (scale=2 -> retina). Landscape, full-width on dedicated routes page.

function fetchImageAsDataURL(url) {
  // Primary path: fetch the bytes directly. Google Static Maps returns
  // Access-Control-Allow-Origin: *, so a CORS fetch succeeds and avoids the
  // canvas entirely (no tainted-canvas SecurityError possible). cache:'reload'
  // forces a fresh network request so a previously cached non-CORS copy can't
  // poison this one. Falls back to <img>+canvas if fetch is unavailable.
  return (async () => {
    try {
      const r = await Promise.race([
        fetch(url, { mode: 'cors', cache: 'reload' }),
        new Promise((_, rej) => setTimeout(() => rej(new Error('fetch timeout')), 8000)),
      ]);
      if (r && r.ok) {
        const blob = await r.blob();
        const dataUrl = await new Promise((res) => {
          const fr = new FileReader();
          fr.onload = () => res(fr.result);
          fr.onerror = () => res(null);
          fr.readAsDataURL(blob);
        });
        if (dataUrl) return dataUrl;
      } else {
        console.warn('static map fetch not ok:', r && r.status);
      }
    } catch (e) {
      console.warn('static map fetch failed, trying <img> fallback:', e && e.message);
    }
    // Fallback: <img crossOrigin> + canvas, with a cache-buster so the browser
    // issues a brand-new CORS request instead of reusing a poisoned cache entry.
    return await new Promise((resolve) => {
      let done = false;
      const finish = (val) => { if (!done) { done = true; resolve(val); } };
      const timer = setTimeout(() => { console.warn('static map img timed out'); finish(null); }, 8000);
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        clearTimeout(timer);
        try {
          const canvas = document.createElement('canvas');
          canvas.width = img.naturalWidth || STATIC_MAP_W * 2;
          canvas.height = img.naturalHeight || STATIC_MAP_H * 2;
          canvas.getContext('2d').drawImage(img, 0, 0);
          finish(canvas.toDataURL('image/png'));
        } catch (e) {
          console.warn('static map canvas export failed (CORS taint?):', e);
          finish(null);
        }
      };
      img.onerror = (e) => { clearTimeout(timer); console.warn('static map image load failed:', url.slice(0, 120), e); finish(null); };
      img.src = url + (url.includes('?') ? '&' : '?') + '_cb=' + Date.now();
    });
  })();
}

// Returns a PNG dataURL for a group's route, or null. teamHex e.g. '4f8cff' (no #).
async function buildGroupRouteMap(orderedJobs, teamHex) {
  const withAddr = orderedJobs.filter(j => j.address && j.address.trim());
  if (!withAddr.length) return null;
  try { await loadGoogleMaps(); } catch (e) { return null; }
  if (!directionsService) directionsService = new google.maps.DirectionsService();

  const origin = await geocode(COMPANY_ADDRESS);
  if (!origin) return null;

  const stops = [];
  for (const j of withAddr) {
    const c = await geocode(j.address);
    if (c) stops.push(c);
  }
  if (!stops.length) return null;

  // Road-following polyline via Directions (keep the given order, do NOT optimise)
  let encoded = null;
  try {
    const o = new google.maps.LatLng(origin.lat, origin.lon);
    const dest = new google.maps.LatLng(stops[stops.length - 1].lat, stops[stops.length - 1].lon);
    const waypoints = stops.slice(0, -1).map(s => ({ location: new google.maps.LatLng(s.lat, s.lon), stopover: true }));
    const result = await new Promise((resolve, reject) => {
      directionsService.route({
        origin: o, destination: dest, waypoints,
        optimizeWaypoints: false, travelMode: google.maps.TravelMode.DRIVING,
      }, (res, status) => status === 'OK' ? resolve(res) : reject(new Error(status)));
    });
    let path = result.routes[0].overview_path || [];
    // downsample to keep URL short
    if (path.length > 100) {
      const step = Math.ceil(path.length / 100);
      path = path.filter((_, i) => i % step === 0 || i === path.length - 1);
    }
    if (google.maps.geometry?.encoding) {
      encoded = google.maps.geometry.encoding.encodePath(path);
    }
  } catch (e) {
    console.warn('directions for route map failed (will draw straight lines):', e);
  }

  // Build Static Maps URL
  const base = 'https://maps.googleapis.com/maps/api/staticmap';
  const params = [];
  params.push(`size=${STATIC_MAP_W}x${STATIC_MAP_H}`);
  params.push('scale=2');
  params.push('maptype=roadmap');
  // company marker (start)
  params.push(`markers=${encodeURIComponent(`color:0x2e7d32|label:S|${origin.lat},${origin.lon}`)}`);
  // stop markers (labels 1-9, then unlabeled)
  stops.forEach((s, i) => {
    const label = (i + 1) <= 9 ? `label:${i + 1}|` : '';
    params.push(`markers=${encodeURIComponent(`color:0x${teamHex}|${label}${s.lat},${s.lon}`)}`);
  });
  // route line
  if (encoded) {
    params.push(`path=${encodeURIComponent(`color:0x${teamHex}ff|weight:4|enc:${encoded}`)}`);
  } else {
    // fallback: straight lines company -> stops
    const pts = [`${origin.lat},${origin.lon}`, ...stops.map(s => `${s.lat},${s.lon}`)].join('|');
    params.push(`path=${encodeURIComponent(`color:0x${teamHex}ff|weight:3|${pts}`)}`);
  }
  params.push(`key=${GMAPS_KEY}`);
  const url = `${base}?${params.join('&')}`;
  if (url.length > 8000) console.warn('static map URL long:', url.length);
  return await fetchImageAsDataURL(url);
}

// Step 2: actually build the PDF, in the saved order, with crew names on the cover
async function ensureJsPDF() {
  if (window.jspdf && window.jspdf.jsPDF) return true;
  const sources = [
    'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js',
    'https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js'
  ];
  for (const src of sources) {
    try {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = () => reject(new Error('failed: ' + src));
        document.head.appendChild(s);
      });
      if (window.jspdf && window.jspdf.jsPDF) return true;
    } catch (e) { console.warn('jsPDF load source failed:', src, e); }
  }
  return !!(window.jspdf && window.jspdf.jsPDF);
}

async function generateDayPDF(date, groupA, groupB, vehicleA, vehicleB) {
  const jobs = orderJobsForDay(date, applyFilters(DATA.items).filter(i => i.install_date === date));
  if (!jobs.length) { toast(`No jobs on ${date}`, 'error'); return; }
  toast(`Generating PDF for ${jobs.length} job${jobs.length>1?'s':''}...`, 'info');

  try { await Promise.race([ensureCNFont(), new Promise(r => setTimeout(r, 6000))]); }
  catch (e) { console.warn('CN font load issue', e); }
  if (!(await ensureJsPDF())) { toast('PDF library failed to load — check your connection and try again', 'error'); return; }
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: 'portrait', unit: 'pt', format: 'a4' });
  try { installCNFont(pdf); } catch (e) { console.warn('installCNFont failed', e); }
  const pageW = pdf.internal.pageSize.getWidth();
  const pageH = pdf.internal.pageSize.getHeight();
  const margin = 36;

  // Cover page (jobs already in display order; crew names passed in)
  try {
    await drawCoverPage(pdf, date, jobs, pageW, pageH, margin, groupA, groupB, vehicleA, vehicleB);
  } catch (e) {
    console.error('Cover page error (continuing without route maps):', e);
    toast('Route maps skipped (error) — PDF still generated', 'info');
  }

  // Per-job page (same order). Installer & vehicle come from the group-level selection.
  for (let i = 0; i < jobs.length; i++) {
    pdf.addPage();
    const groupVehicle = jobs[i].team === 'Group A' ? vehicleA
                       : jobs[i].team === 'Group B' ? vehicleB : '';
    const groupInstaller = jobs[i].team === 'Group A' ? groupA
                         : jobs[i].team === 'Group B' ? groupB : '';
    try {
      await renderJobSheet(pdf, jobs[i], margin, pageW - margin * 2, pageW, pageH, i + 1, jobs.length, groupVehicle, groupInstaller);
    } catch (e) {
      console.error(`Job sheet ${i+1} render failed:`, jobs[i] && jobs[i].name, e);
      toast(`Job "${(jobs[i] && jobs[i].name) || (i+1)}" had an error — skipped on PDF`, 'info');
    }
  }

  pdf.save(`ACE-${date}.pdf`);
  toast(`PDF saved`, 'success');
}

async function drawCoverPage(pdf, date, jobs, pageW, pageH, margin, groupA, groupB, vehicleA, vehicleB) {
  const dObj = new Date(date + 'T00:00');
  const dateStr = dObj.toLocaleDateString('en-AU', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  // Top accent band
  pdf.setFillColor(...PDF_COLORS.primary);
  pdf.rect(0, 0, pageW, 6, 'F');

  // Brand
  pdf.setFontSize(11);
  pdf.setTextColor(...PDF_COLORS.textSecondary);
  pdf.text('ACE SIGN', margin, 50);
  pdf.setFontSize(9);
  pdf.text('Daily Installation Schedule', margin, 64);

  // Date - large
  pdf.setFontSize(32);
  pdf.setTextColor(...PDF_COLORS.dark);
  pdf.setFont(undefined, 'bold');
  pdf.text(dateStr, margin, 120);
  pdf.setFont(undefined, 'normal');

  // Stats row
  const totalHrs = jobs.reduce((s, j) => s + parseFloat(j.duration_hours || 0), 0);
  const teamAJobs = jobs.filter(j => j.team === 'Group A').length;
  const teamBJobs = jobs.filter(j => j.team === 'Group B').length;

  let sy = 160;
  pdf.setDrawColor(...PDF_COLORS.border);
  pdf.line(margin, sy, pageW - margin, sy);
  sy += 26;

  const statBlocks = [
    { label: 'TOTAL JOBS', value: String(jobs.length), big: true },
    { label: 'TOTAL HOURS', value: totalHrs > 0 ? totalHrs.toFixed(0) + 'h' : '—', big: true },
    { label: 'GROUP A', value: (groupA && groupA.trim()) ? groupA.trim() : '—', sub: `${teamAJobs} job${teamAJobs!==1?'s':''}${vehicleA ? ' · ' + vehicleA : ''}`, color: PDF_COLORS.teamA, big: false },
    { label: 'GROUP B', value: (groupB && groupB.trim()) ? groupB.trim() : '—', sub: `${teamBJobs} job${teamBJobs!==1?'s':''}${vehicleB ? ' · ' + vehicleB : ''}`, color: PDF_COLORS.teamB, big: false },
  ];

  const blockW = (pageW - margin * 2) / statBlocks.length;
  statBlocks.forEach((b, i) => {
    const bx = margin + i * blockW;
    pdf.setFontSize(8);
    pdf.setTextColor(...PDF_COLORS.textSecondary);
    pdf.text(b.label, bx, sy);
    if (b.big) {
      pdf.setFontSize(22);
      pdf.setTextColor(...(b.color || PDF_COLORS.dark));
      pdf.setFont(undefined, 'bold');
      pdf.text(String(b.value), bx, sy + 26);
      pdf.setFont(undefined, 'normal');
    } else {
      // Crew name(s): smaller font, wrap to fit the column, then job count beneath
      pdf.setFontSize(13);
      pdf.setTextColor(...(b.color || PDF_COLORS.dark));
      pdf.setFont(undefined, 'bold');
      const lines = pdf.splitTextToSize(String(b.value), blockW - 10).slice(0, 2);
      pdf.text(lines, bx, sy + 14);
      pdf.setFont(undefined, 'normal');
      pdf.setFontSize(8);
      pdf.setTextColor(...PDF_COLORS.textSecondary);
      pdf.text(b.sub || '', bx, sy + 14 + lines.length * 14 + 4);
    }
  });

  // Job list
  sy += 60;
  pdf.setFontSize(11);
  pdf.setTextColor(...PDF_COLORS.dark);
  pdf.setFont(undefined, 'bold');
  pdf.text('JOBS', margin, sy);
  pdf.setFont(undefined, 'normal');
  sy += 4;
  pdf.line(margin, sy, pageW - margin, sy);
  sy += 18;

  // Use the order passed in (matches the on-screen list / manual drag order)
  const sortedJobs = jobs;

  // Job list gets the FULL first page; the two route maps go on their own page after.
  const jobListLimit = pageH - 42;                        // list may run to the bottom of page 1
  const mapW = pageW - margin * 2;                        // full content width (used on routes page)
  const mapH = mapW * (STATIC_MAP_H / STATIC_MAP_W);      // proportional, no distortion
  const mapGap = 22;                                      // vertical gap between the two maps
  const mapTitleH = 16;                                   // space above each map for its title

  pdf.setFontSize(10);
  for (let i = 0; i < sortedJobs.length; i++) {
    const j = sortedJobs[i];
    if (sy > jobListLimit) break; // leave room for route maps

    // Team color tag
    const teamColor = j.team === 'Group A' ? PDF_COLORS.teamA
                    : j.team === 'Group B' ? PDF_COLORS.teamB
                    : PDF_COLORS.textSecondary;
    pdf.setFillColor(...teamColor);
    pdf.rect(margin, sy - 9, 3, 14, 'F');

    pdf.setTextColor(...PDF_COLORS.dark);
    pdf.setFont(undefined, 'bold');
    const numLabel = `${String(i+1).padStart(2,'0')}.`;
    pdf.text(numLabel, margin + 10, sy);
    pdf.setFont(undefined, 'normal');

    const teamShort = j.team === 'Group A' ? '[A]' : (j.team === 'Group B' ? '[B]' : '[ ]');
    pdf.setTextColor(...teamColor);
    pdf.text(teamShort, margin + 38, sy);

    pdf.setTextColor(...PDF_COLORS.dark);
    const nameTrunc = pdf.splitTextToSize(j.name || '', 240)[0] || '';
    pdf.text(nameTrunc, margin + 64, sy);

    pdf.setTextColor(...PDF_COLORS.textSecondary);
    pdf.text(j.installer || '—', margin + 320, sy);
    pdf.text((j.plan_hours || '—') + (j.plan_hours ? 'h' : ''), margin + 420, sy);
    pdf.text(j.project_type || 'Install', margin + 470, sy);

    sy += 20;
  }

  // === Route maps (company -> stops, per group) ===
  const aJobs = sortedJobs.filter(j => j.team === 'Group A');
  const bJobs = sortedJobs.filter(j => j.team === 'Group B');
  const teamAHex = '4f8cff', teamBHex = 'ff6d3b';
  let mapA = null, mapB = null;
  // Hard timeout: if Google Maps / geocoding / directions hang, give up after 12s and
  // still produce the PDF. (try/catch alone can't rescue a never-resolving await.)
  const withTimeout = (p, ms) => Promise.race([
    p,
    new Promise(res => setTimeout(() => res(null), ms)),
  ]);
  try {
    [mapA, mapB] = await withTimeout(Promise.all([
      aJobs.length ? buildGroupRouteMap(aJobs, teamAHex) : Promise.resolve(null),
      bJobs.length ? buildGroupRouteMap(bJobs, teamBHex) : Promise.resolve(null),
    ]), 12000) || [null, null];
  } catch (e) { console.warn('route maps failed', e); }

  // Page 1 footer (drawn before any maps page is added)
  pdf.setFontSize(8);
  pdf.setTextColor(...PDF_COLORS.textSecondary);
  pdf.text(`Generated ${new Date().toLocaleString('en-AU')}`, margin, pageH - 24);
  pdf.text('Cover page', pageW - margin, pageH - 24, { align: 'right' });

  // === Route maps on their own page (full width, large) ===
  if (mapA || mapB) {
    pdf.addPage();
    pdf.setFillColor(...PDF_COLORS.primary);
    pdf.rect(0, 0, pageW, 6, 'F');
    pdf.setFontSize(16);
    pdf.setTextColor(...PDF_COLORS.dark);
    pdf.setFont(undefined, 'bold');
    pdf.text(`Routes — ${dateStr}`, margin, 52);
    pdf.setFont(undefined, 'normal');
    pdf.setFontSize(9);
    pdf.setTextColor(...PDF_COLORS.textSecondary);
    pdf.text('S = company  ·  numbers = stops in order', margin, 68);

    const drawMap = (dataUrl, topY, label, hex) => {
      const rgb = [parseInt(hex.slice(0,2),16), parseInt(hex.slice(2,4),16), parseInt(hex.slice(4,6),16)];
      pdf.setFontSize(11);
      pdf.setTextColor(...rgb);
      pdf.setFont(undefined, 'bold');
      pdf.text(label, margin, topY + 11);
      pdf.setFont(undefined, 'normal');
      const imgY = topY + mapTitleH;
      if (dataUrl) {
        try { pdf.addImage(dataUrl, 'PNG', margin, imgY, mapW, mapH, undefined, 'FAST'); }
        catch (e) {
          pdf.setDrawColor(...PDF_COLORS.border);
          pdf.roundedRect(margin, imgY, mapW, mapH, 4, 4, 'S');
          pdf.setFontSize(8); pdf.setTextColor(...PDF_COLORS.textSecondary);
          pdf.text('(map unavailable)', margin + 8, imgY + 20);
        }
      } else {
        pdf.setDrawColor(...PDF_COLORS.border);
        pdf.roundedRect(margin, imgY, mapW, mapH, 4, 4, 'S');
        pdf.setFontSize(8); pdf.setTextColor(...PDF_COLORS.textSecondary);
        pdf.text('(no located stops)', margin + 8, imgY + 20);
      }
    };
    const aTop = 88;
    const bTop = aTop + mapTitleH + mapH + mapGap;
    drawMap(mapA, aTop, 'Group A', teamAHex);
    drawMap(mapB, bTop, 'Group B', teamBHex);

    pdf.setFontSize(8);
    pdf.setTextColor(...PDF_COLORS.textSecondary);
    pdf.text('Routes page', pageW - margin, pageH - 24, { align: 'right' });
  }
}

async function renderJobSheet(pdf, job, margin, contentW, pageW, pageH, pageNum, totalPages, groupVehicle, groupInstaller) {
  // Installer shown on the sheet: group-level selection takes priority, else the item's own field

                  : job.team === 'Group B' ? PDF_COLORS.teamB

  pdf.setFillColor(...teamColor);
  pdf.rect(0, 0, pageW, 6, 'F');

  // === Header ===
  pdf.setFontSize(9);
  pdf.setTextColor(...PDF_COLORS.textSecondary);
  pdf.text('ACE SIGN · INSTALLATION JOB', margin, 32);
  pdf.text(`Page ${pageNum} of ${totalPages + 1}`, pageW - margin, 32, { align: 'right' });

  // === Title block ===
  let y = 56;
  pdf.setFontSize(10);
  pdf.setTextColor(...PDF_COLORS.primary);
  pdf.setFont(undefined, 'bold');
  if (job.invoice_number) {
    pdf.text(`INV ${job.invoice_number}`, margin, y);
  }
  pdf.setFont(undefined, 'normal');

  y += 10;
  pdf.setFontSize(22);
  pdf.setTextColor(...PDF_COLORS.dark);
  pdf.setFont(undefined, 'bold');
  const titleLines = pdf.splitTextToSize(job.name || '', contentW);
  pdf.text(titleLines, margin, y + 12);
  pdf.setFont(undefined, 'normal');
  y += titleLines.length * 24 + 6;

  // === Team badge ===
  if (job.team) {
    pdf.setFillColor(...teamColor);
    const teamText = `${job.team}${installerText ? '   ·   ' + installerText : ''}`;
    const tw = pdf.getTextWidth(teamText) + 20;
    pdf.roundedRect(margin, y, tw, 22, 11, 11, 'F');
    pdf.setFontSize(11);
    pdf.setTextColor(255, 255, 255);
    pdf.setFont(undefined, 'bold');
    pdf.text(teamText, margin + 10, y + 15);
    pdf.setFont(undefined, 'normal');
    y += 32;
  } else {
    y += 8;
  }

  // === Info card ===
  const cardY = y;
  const cardH = 130;
  pdf.setFillColor(...PDF_COLORS.bgLight);
  pdf.setDrawColor(...PDF_COLORS.border);
  pdf.roundedRect(margin, cardY, contentW, cardH, 6, 6, 'FD');

  const col1X = margin + 16;

  const fields = [
    [

    ],
    [
      { label: 'SALES', value: job.sales || '—' },
      { label: 'PRIORITY', value: job.priority || '—', priority: job.priority },
    ],
  ];

  fields.forEach((row, idx) => {
    const ry = cardY + 14 + idx * 38;
    row.forEach((field, ci) => {
      const cx = ci === 0 ? col1X : col2X;
      pdf.setFontSize(8);
      pdf.setTextColor(...PDF_COLORS.textSecondary);
      pdf.text(field.label, cx, ry);
      pdf.setFontSize(12);
      pdf.setFont(undefined, 'bold');

      const valTrunc = pdf.splitTextToSize(field.value, contentW / 2 - 30)[0] || '';
      pdf.text(valTrunc, cx, ry + 14);
      pdf.setFont(undefined, 'normal');
    });
  });

  y = cardY + cardH + 16;

  // === Address ===

  pdf.setTextColor(...PDF_COLORS.textSecondary);
  pdf.text('ADDRESS', margin, y);
  pdf.setFontSize(13);
  pdf.setTextColor(...PDF_COLORS.dark);
  const addrLines = pdf.splitTextToSize(job.address || '—', contentW);
  pdf.text(addrLines, margin, y + 16);
  y += 16 + addrLines.length * 16 + 14;

  // === Vehicle / Actual Hours fields (for scheduler to fill in) ===
  pdf.setDrawColor(...PDF_COLORS.border);
  pdf.line(margin, y, margin + contentW, y);
  y += 18;

  const halfW = (contentW - 16) / 2;

  pdf.setFontSize(8);
  pdf.setTextColor(...PDF_COLORS.textSecondary);
  pdf.text('VEHICLE', margin, y);
  pdf.setDrawColor(...PDF_COLORS.border);
  pdf.roundedRect(margin, y + 6, halfW, 28, 4, 4, 'S');
  const vehicleText = (groupVehicle != null && groupVehicle !== '') ? groupVehicle : (job.vehicle || '');
  if (vehicleText) {
    pdf.setFontSize(12);
    pdf.setTextColor(...PDF_COLORS.dark);
    pdf.text(vehicleText, margin + 10, y + 24);
  }
  // Actual hours box
  pdf.setFontSize(8);
  pdf.setTextColor(...PDF_COLORS.textSecondary);
  pdf.text('ACTUAL WORKING HOURS', margin + halfW + 16, y);
  pdf.roundedRect(margin + halfW + 16, y + 6, halfW, 28, 4, 4, 'S');

  y += 50;

  // === Sign Proof images ===
  if (job.production_id) {
    pdf.setFontSize(8);
    pdf.setTextColor(...PDF_COLORS.textSecondary);
    pdf.text('SIGN PROOF / REFERENCE', margin, y);
    y += 12;

    const proofImages = [];
    for (let p = 1; p <= 8; p++) {
      const data = await loadImageAsDataUrl(`proofs/${job.production_id}_p${p}.jpg`);
      if (data) {
        // Get dimensions
        const dims = await getImageDims(data);
        proofImages.push({ data, w: dims.w, h: dims.h, ar: dims.w / dims.h });
      } else break;
    }

    if (proofImages.length) {
      // Proof area must end above the fixed NOTES box (notes height 64 + label 14 + footer/gap ~40)
      const proofBottom = pageH - 24 - 14 - 64 - 18;
      const remainingH = proofBottom - y;
      const n = proofImages.length;

      if (n === 1) {
        // Single image: fit within (contentW × maxH), preserving aspect ratio
        const maxH = Math.min(360, remainingH);
        const img = proofImages[0];
        let drawW = contentW;
        let drawH = drawW / img.ar;
        if (drawH > maxH) {
          drawH = maxH;
          drawW = drawH * img.ar;
        }
        const drawX = margin + (contentW - drawW) / 2; // center horizontally
        try {
          pdf.addImage(img.data, 'JPEG', drawX, y, drawW, drawH, undefined, 'FAST');
          y += drawH + 12;
        } catch (e) { console.error(e); }
      } else {
        // Multiple images: 2-column grid, each image fit-within its cell preserving AR
        const cols = 2;
        const rows = Math.ceil(n / cols);
        const gap = 8;
        const cellW = (contentW - gap * (cols - 1)) / cols;
        const cellH = Math.min(180, (remainingH - gap * (rows - 1)) / rows);
        proofImages.slice(0, cols * rows).forEach((img, idx) => {
          const ri = Math.floor(idx / cols);
          const ci = idx % cols;
          const cellX = margin + ci * (cellW + gap);
          const cellY = y + ri * (cellH + gap);
          // Fit within cell preserving AR
          let drawW = cellW;
          let drawH = drawW / img.ar;
          if (drawH > cellH) {
            drawH = cellH;
            drawW = drawH * img.ar;
          }
          const drawX = cellX + (cellW - drawW) / 2;
          const drawY = cellY + (cellH - drawH) / 2;
          try {
            pdf.addImage(img.data, 'JPEG', drawX, drawY, drawW, drawH, undefined, 'FAST');
          } catch (e) { console.error(e); }
        });
        y += rows * cellH + (rows - 1) * gap + 8;
      }
    } else {
      pdf.setFontSize(10);
      pdf.setTextColor(...PDF_COLORS.textSecondary);
      pdf.text('No reference images available', margin, y + 14);
      y += 30;
    }
  }

  // === Notes (FIXED position at page bottom for consistent layout across all pages) ===
  const NOTES_H = 64;
  const notesY = pageH - 24 - 14 - NOTES_H; // footer at pageH-24; gap; then notes box
  pdf.setFontSize(8);
  pdf.setTextColor(...PDF_COLORS.textSecondary);
  pdf.text('NOTES', margin, notesY - 6);
  pdf.setDrawColor(...PDF_COLORS.border);
  pdf.roundedRect(margin, notesY, contentW, NOTES_H, 4, 4, 'S');
  if (job.scheduler_notes) {
    pdf.setFontSize(10);
    pdf.setTextColor(...PDF_COLORS.dark);
    const lines = pdf.splitTextToSize(job.scheduler_notes, contentW - 16);
    pdf.text(lines.slice(0, 3), margin + 8, notesY + 16);
  }

  // === Footer ===
  pdf.setFontSize(7);
  pdf.setTextColor(...PDF_COLORS.textSecondary);
  pdf.text(`ACE SIGN PTY LTD`, margin, pageH - 24);
  pdf.text(`Generated ${new Date().toLocaleString('en-AU')}`, pageW - margin, pageH - 24, { align: 'right' });
}

// ============ VIEW SWITCHING ============
document.getElementById('viewTabs').addEventListener('click', e => {
  const tab = e.target.closest('.view-tab');
  if (!tab) return;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
  currentView = tab.dataset.view;
  document.getElementById('view-' + currentView).classList.add('active');
  render();
  // For Google Maps, no resize call needed - it auto-detects
});

document.getElementById('scopeTabs').addEventListener('click', e => {
  const tab = e.target.closest('.scope-tab');
  if (!tab) return;
  document.querySelectorAll('.scope-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentScope = tab.dataset.scope;
  render();
  renderStats();
});

document.getElementById('prevBtn').addEventListener('click', () => {
  monthCursor = new Date(monthCursor.getFullYear(), monthCursor.getMonth() - 1, 1);
  render();
});

document.getElementById('nextBtn').addEventListener('click', () => {
  monthCursor = new Date(monthCursor.getFullYear(), monthCursor.getMonth() + 1, 1);
  render();
});

document.getElementById('todayBtn').addEventListener('click', () => {
  monthCursor = new Date();
  weekStart = startOfWeek(new Date());
  dayCursor = new Date();
  render();
  // Scroll to today's section if in list view
  if (currentView === 'list') {
    const today = ymd(new Date());
    const todaySec = document.querySelector(`.day-section[data-date="${today}"]`);
    if (todaySec) todaySec.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
});

// === Week label dropdown ===
const weekLabel = document.getElementById('weekLabel');
const weekDropdown = document.getElementById('weekDropdown');

weekLabel.addEventListener('click', (e) => {
  e.stopPropagation();
  weekDropdown.classList.toggle('show');
});

// Close on outside click
document.addEventListener('click', (e) => {
  if (!weekDropdown.contains(e.target) && e.target !== weekLabel) {
    weekDropdown.classList.remove('show');
  }
});

// Quick options
weekDropdown.querySelectorAll('.wld-option').forEach(opt => {
  opt.addEventListener('click', () => {
    const quick = opt.dataset.quick;
    const today = new Date();

    if (currentView === 'map') {
      // For map: control date filter chips
      const map = { today: 'today', tomorrow: 'tomorrow', thisweek: 'week', nextweek: 'nextweek', thismonth: 'month' };
      mapDateFilter = map[quick];
      document.querySelectorAll('.date-chip').forEach(c => {
        c.classList.toggle('active', c.dataset.dateFilter === mapDateFilter);
      });
      mapRouteTeam = null;
      if (directionsRenderer) directionsRenderer.setDirections({ routes: [] });
      const rs = document.getElementById('routeSummary');
      const cb = document.getElementById('clearRouteBtn');
      if (rs) rs.style.display = 'none';
      if (cb) cb.style.display = 'none';
      document.querySelectorAll('.route-btn').forEach(b => b.classList.remove('active'));
      renderMap();
    } else {
      // For list view: navigate monthCursor
      if (quick === 'today' || quick === 'thisweek' || quick === 'thismonth') {
        monthCursor = new Date();
      } else if (quick === 'tomorrow') {
        const t = new Date(); t.setDate(t.getDate() + 1);
        monthCursor = new Date(t.getFullYear(), t.getMonth(), 1);
      }
      render();
      // Scroll to relevant section
      let targetDate;
      if (quick === 'today') targetDate = ymd(today);
      else if (quick === 'tomorrow') { const t = new Date(); t.setDate(t.getDate() + 1); targetDate = ymd(t); }
      if (targetDate) {
        setTimeout(() => {
          const sec = document.querySelector(`.day-section[data-date="${targetDate}"]`);
          if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
      }
    }
    weekDropdown.classList.remove('show');
  });
});

// Custom date picker (single day)
document.getElementById('customDatePicker').addEventListener('change', (e) => {
  const val = e.target.value; // "2026-05-25"
  if (!val) return;
  const picked = new Date(val + 'T00:00');

  if (currentView === 'map') {
    // Treat as a "today-style" filter but for the picked date
    // Use a custom filter that matches exactly this date
    mapCustomDate = val;
    mapDateFilter = 'custom';
    document.querySelectorAll('.date-chip').forEach(c => c.classList.remove('active'));
    renderMap();
  } else {
    monthCursor = new Date(picked.getFullYear(), picked.getMonth(), 1);
    render();
    setTimeout(() => {
      const sec = document.querySelector(`.day-section[data-date="${val}"]`);
      if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }
  weekDropdown.classList.remove('show');
});

// Custom month picker
document.getElementById('customMonthPicker').addEventListener('change', (e) => {
  const val = e.target.value; // "2026-05"
  if (!val) return;
  const [y, m] = val.split('-').map(Number);

  if (currentView === 'map') {
    mapDateFilter = 'month';
    mapCustomMonth = val;
    document.querySelectorAll('.date-chip').forEach(c => c.classList.remove('active'));
    renderMap();
  } else {
    monthCursor = new Date(y, m - 1, 1);
    render();
  }
  weekDropdown.classList.remove('show');
});

document.getElementById('refreshBtn').addEventListener('click', async () => {
  await loadData();
  renderStats();
  render();
  toast('Data refreshed', 'success');
});

document.getElementById('downloadDayPdfBtn').addEventListener('click', () => {
  downloadDayPDF(ymd(new Date()));
});

document.querySelectorAll('.team-toggle').forEach(t => {
  t.addEventListener('click', () => {
    const team = t.dataset.team;
    if (teamFilters.has(team)) teamFilters.delete(team);
    else teamFilters.add(team);
    t.classList.toggle('active');
    render();
  });
});

document.querySelectorAll('.type-toggle').forEach(t => {
  t.addEventListener('click', () => {
    const type = t.dataset.type;
    if (typeFilters.has(type)) typeFilters.delete(type);
    else typeFilters.add(type);
    t.classList.toggle('active');
    render();
  });
});

// ============ TOAST ============
let toastTimer = null;
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.className = `toast ${type} show`;
  el.textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ============ RENDER ROUTER ============
function render() {
  renderStats();
  if (currentView === 'list') renderList();
  else if (currentView === 'week') renderWeek();
  else if (currentView === 'map') renderMap();
}

// ============ INIT ============
async function init() {
  await loadData();
  bindMapControls();
  // Role badge
  const badge = document.getElementById('roleBadge');
  if (badge) {
    badge.textContent = USER_ROLE === 'editor' ? '✏️ Editor' : '👁 Viewer';
    badge.className = 'role-badge ' + USER_ROLE;
  }
  // Footer hint
  const hint = document.getElementById('footerHint');
  if (hint) {
    hint.textContent = USER_ROLE === 'editor'
      ? 'Drag cards between days to reschedule · Click for details'
      : 'Read-only mode · Click cards for details';
  }
  // Sign out
  const so = document.getElementById('signOutBtn');
  if (so) {
    so.addEventListener('click', () => {
      sessionStorage.removeItem('auth');
      sessionStorage.removeItem('role');
      sessionStorage.removeItem('loginPw');
      location.reload();
    });
  }
  renderStats();
  render();
}

// ============ UTIL ============
function escapeHTML(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[c]));
}
